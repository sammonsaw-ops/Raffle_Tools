<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raffle Banner Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #f6ae2d; --gold-light: #f9c86a; --gold-dark: #c98a10;
      --dark: #2e2f31; --surface: #3a3b3e; --surface-2: #434446; --surface-3: #4e5052;
      --text: #f0f0f0; --text-muted: #b0b1b3;
      --border: rgba(246,174,45,0.28); --border-soft: rgba(255,255,255,0.08);
      --green: #59b55e; --purple: #8075ff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'DM Sans',sans-serif; background:var(--dark);
      background-image:radial-gradient(ellipse at 15% 40%,rgba(89,181,94,.07) 0%,transparent 55%),
        radial-gradient(ellipse at 85% 10%,rgba(128,117,255,.12) 0%,transparent 50%);
      padding:36px 20px 60px; min-height:100vh; color:var(--text);
    }
    .container { max-width:1060px; margin:0 auto; }
    .app-header { text-align:center; margin-bottom:40px; }
    .ticket-icon { display:inline-block; font-size:2.4rem; margin-bottom:10px; filter:drop-shadow(0 0 12px rgba(246,174,45,.4)); }
    .app-header h1 {
      font-family:'Playfair Display',serif; font-size:2.8rem; font-weight:900;
      background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 45%,#c98a10 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1.1;
    }
    .app-header .subtitle { color:var(--text-muted); font-size:.78rem; letter-spacing:.18em; text-transform:uppercase; margin-top:8px; }
    .header-rule { display:flex; align-items:center; justify-content:center; gap:10px; margin-top:18px; }
    .header-rule .line { height:1px; width:70px; }
    .header-rule .line-l { background:linear-gradient(90deg,transparent,var(--gold)); }
    .header-rule .line-r { background:linear-gradient(90deg,var(--gold),transparent); }
    .header-rule .gem { width:7px; height:7px; background:var(--gold); transform:rotate(45deg); box-shadow:0 0 6px rgba(246,174,45,.6); }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px 32px; margin-bottom:18px; box-shadow:0 2px 0 rgba(246,174,45,.08) inset, 0 8px 40px rgba(0,0,0,.35); }
    .section-label { font-size:.65rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--gold); margin-bottom:22px; display:flex; align-items:center; gap:12px; }
    .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:18px; }
    .form-group { display:flex; flex-direction:column; }
    .form-group.full-width { grid-column:1/-1; }
    label { font-weight:500; margin-bottom:6px; color:var(--text-muted); font-size:.75rem; letter-spacing:.07em; text-transform:uppercase; }
    label .hint { font-size:.85em; font-weight:400; opacity:.7; text-transform:none; letter-spacing:0; }
    input[type=text], input[type=number], input[type=date], input[type=time], select {
      padding:11px 14px; background:var(--surface-2); border:1px solid var(--border-soft); border-radius:8px;
      font-size:.93em; font-family:'DM Sans',sans-serif; color:var(--text);
      transition:border-color .2s,box-shadow .2s,background .2s; -webkit-appearance:none;
    }
    input:focus, select:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,168,76,.1); background:var(--surface-3); }
    select option { background:var(--surface-2); color:var(--text); }
    input[type=date]::-webkit-calendar-picker-indicator, input[type=time]::-webkit-calendar-picker-indicator { filter:invert(.7) sepia(.4) saturate(3) hue-rotate(10deg); cursor:pointer; }
    input[type=file] { padding:10px 14px; border:1px dashed rgba(246,174,45,.35); border-radius:8px; cursor:pointer; background:var(--surface-2); color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:.86em; transition:border-color .2s,background .2s; }
    input[type=file]:hover { border-color:var(--gold); background:var(--surface-3); }
    input[type=file]:disabled { opacity:.35; cursor:not-allowed; }

    /* Mode switcher */
    .mode-switcher { display:flex; background:var(--surface-2); border:1px solid var(--border-soft); border-radius:12px; padding:5px; margin-bottom:22px; gap:4px; }
    .mode-btn { flex:1; padding:11px 16px; border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:.82rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; transition:all .25s; background:transparent; color:var(--text-muted); margin-top:0; box-shadow:none; }
    .mode-btn:hover { color:var(--text); background:rgba(255,255,255,.05); transform:none; box-shadow:none; filter:none; }
    .mode-btn.active { background:linear-gradient(135deg,var(--purple) 0%,#6a5ee0 50%,#4f45b8 100%); color:#fff; box-shadow:0 4px 16px rgba(128,117,255,.35); transform:none; filter:none; }

    /* Sport grid */
    .sport-selector-section { display:none; margin-bottom:20px; }
    .sport-selector-section.visible { display:block; }
    .sport-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(88px,1fr)); gap:8px; }
    .sport-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; padding:10px 6px; border:1px solid var(--border-soft); border-radius:10px; background:var(--surface-2); cursor:pointer; transition:all .2s; margin-top:0; font-size:.7rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--text-muted); box-shadow:none; }
    .sport-btn:hover { border-color:rgba(255,255,255,.2); background:var(--surface-3); color:var(--text); transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.3); filter:none; }
    .sport-btn.active { border-color:var(--gold); background:rgba(246,174,45,.12); color:var(--gold); box-shadow:0 0 0 1px rgba(246,174,45,.3),0 4px 16px rgba(246,174,45,.15); transform:translateY(-1px); filter:none; }
    .sport-btn .sport-emoji { font-size:1.6rem; line-height:1; }

    /* Toggle */
    .toggle-section { background:var(--surface-2); border:1px solid var(--border-soft); padding:18px 22px; border-radius:10px; margin-bottom:22px; }
    .toggle-header { display:flex; align-items:center; gap:14px; cursor:pointer; user-select:none; }
    .toggle-switch { position:relative; width:46px; height:24px; background:rgba(255,255,255,.08); border-radius:12px; transition:background .3s; border:1px solid rgba(255,255,255,.12); flex-shrink:0; }
    .toggle-switch.active { background:linear-gradient(135deg,var(--green) 0%,#3d8a42 100%); border-color:var(--green); }
    .toggle-switch::after { content:''; position:absolute; width:18px; height:18px; background:white; border-radius:50%; top:2px; left:2px; transition:left .3s; box-shadow:0 1px 4px rgba(0,0,0,.4); }
    .toggle-switch.active::after { left:24px; }
    .toggle-label { font-weight:600; color:var(--text); font-size:.93em; }
    .additional-fields { display:none; animation:fadeSlide .3s ease-out; margin-top:20px; padding-top:20px; border-top:1px solid var(--border-soft); }
    .additional-fields.visible { display:block; }
    @keyframes fadeSlide { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .package-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .package-row input { flex:1; }
    .package-row .for-label { color:var(--text-muted); font-size:.88em; white-space:nowrap; }
    .input-prefix-wrap { display:flex; align-items:center; }
    .input-prefix-wrap input { flex:1; border-radius:0 6px 6px 0; border-left:none; min-width:0; }
    .input-prefix { background:#f4f4f4; border:1px solid #ddd; border-right:none; border-radius:6px 0 0 6px; padding:8px 9px; font-size:14px; color:#444; line-height:1.4; white-space:nowrap; }
    .package-row .remove-package { background:rgba(220,80,80,.15); color:#ff7070; border:1px solid rgba(220,80,80,.3); border-radius:50%; width:30px; height:30px; font-size:1.3em; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center; line-height:1; margin-top:0; flex-shrink:0; transition:background .2s,transform .15s; }
    .package-row .remove-package:hover { background:rgba(220,80,80,.3); transform:scale(1.1); box-shadow:none; }
    #packageContainer { margin-bottom:8px; }
    button { background:linear-gradient(135deg,var(--purple) 0%,#6a5ee0 50%,#4f45b8 100%); color:#fff; border:none; padding:13px 30px; font-size:.85em; font-weight:700; font-family:'DM Sans',sans-serif; letter-spacing:.1em; text-transform:uppercase; border-radius:8px; cursor:pointer; transition:transform .18s,box-shadow .18s,filter .18s; margin-top:16px; }
    button:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(128,117,255,.35); filter:brightness(1.07); }
    button:active { transform:translateY(0); box-shadow:none; }
    .btn-generate { display:block; width:100%; padding:17px; font-size:.95em; letter-spacing:.15em; margin-top:0; border-radius:10px; position:relative; overflow:hidden; }
    .btn-generate::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.15) 50%,transparent 100%); transform:translateX(-100%); transition:transform .6s; }
    .btn-generate:hover::before { transform:translateX(100%); }
    .btn-add { padding:9px 20px; font-size:.8em; margin-top:8px; }
    .preview-container { text-align:center; margin-top:28px; padding-top:28px; border-top:1px solid var(--border); }
    .preview-label { font-size:.65rem; letter-spacing:.2em; text-transform:uppercase; color:var(--text-muted); margin-bottom:12px; }
    #preview { border-radius:12px; display:block; max-width:100%; height:auto; box-shadow:0 0 0 1px rgba(246,174,45,.15),0 12px 60px rgba(0,0,0,.7); }
    #downloadLink { display:inline-block; background:linear-gradient(135deg,var(--green) 0%,#3d8a42 50%,#2d6e32 100%); color:#fff; padding:13px 36px; text-decoration:none; border-radius:8px; margin-top:20px; font-weight:700; font-family:'DM Sans',sans-serif; letter-spacing:.1em; text-transform:uppercase; font-size:.88em; transition:transform .18s,box-shadow .18s; }
    #downloadLink:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(89,181,94,.35); }
    .action-row { padding:24px 0 0; }
  </style>
</head>
<body>
<div class="container">
  <div class="app-header">
    <div class="ticket-icon">🎟️</div>
    <h1>Raffle Banner Generator</h1>
    <p class="subtitle">Professional Sport Banner Design</p>
    <div class="header-rule">
      <span class="line line-l"></span><span class="gem"></span>
      <span class="gem" style="width:5px;height:5px;opacity:.5"></span>
      <span class="gem"></span><span class="line line-r"></span>
    </div>
  </div>

  <div class="card">
    <p class="section-label">Banner Mode</p>
    <div class="mode-switcher">
      <button type="button" class="mode-btn active" id="modeStandard" onclick="setMode('standard')">🎟️ Standard Banner</button>
      <button type="button" class="mode-btn" id="modeSport" onclick="setMode('sport')">🏆 Sport Banner</button>
    </div>
    <div class="sport-selector-section" id="sportSelectorSection">
      <p class="section-label">Select Sport</p>
      <div class="sport-grid" id="sportGrid">
        <button type="button" class="sport-btn active" data-sport="hockey" onclick="selectSport(this)"><span class="sport-emoji">🏒</span>Hockey</button>
        <button type="button" class="sport-btn" data-sport="soccer" onclick="selectSport(this)"><span class="sport-emoji"><svg width="26" height="26" viewBox="0 0 26 26" style="display:block;margin:0 auto">
  <defs><clipPath id="ballClip"><circle cx="13" cy="13" r="11.5"/></clipPath></defs>
  <circle cx="13" cy="13" r="11.5" fill="#f5f5f5" stroke="#aaa" stroke-width="0.5"/>
  <g clip-path="url(#ballClip)" stroke="#1a1a1a" stroke-width="0.7" stroke-linejoin="round">
    <!-- 5 hexagons (white) interleaved between pentagons, offset 36deg -->
    <polygon points="13,7.1 15.2,8.8 14.3,11.4 11.7,11.4 10.8,8.8" fill="#f5f5f5"/>
    <polygon points="17.9,10.3 20.1,10.3 21,13 19.3,15 17.1,14.1" fill="#f5f5f5"/>
    <polygon points="16.5,17.8 18.3,16.3 19.3,17.5 18.6,20 16.1,20" fill="#f5f5f5"/>
    <polygon points="9.9,20 7.4,20 6.7,17.5 7.7,16.3 9.5,17.8" fill="#f5f5f5"/>
    <polygon points="5,14.1 2.8,13 3.7,10.3 5.9,10.3 6.9,13" fill="#f5f5f5"/>
    <!-- centre pentagon (black) -->
    <polygon points="13,9.8 15.1,11.3 14.3,13.7 11.7,13.7 10.9,11.3" fill="#1a1a1a"/>
    <!-- 5 outer pentagons (black) -->
    <polygon points="13,2.5 15.4,4.3 14.5,7 11.5,7 10.6,4.3" fill="#1a1a1a"/>
    <polygon points="20.6,7.7 23,9.5 22.6,12.6 19.8,13.5 18,11.4" fill="#1a1a1a"/>
    <polygon points="18.9,20.7 16.8,22.8 13.9,21.9 13.5,18.9 16,17.5" fill="#1a1a1a"/>
    <polygon points="7.1,20.7 6.5,17.5 9,18.9 12.5,18.9 12.1,21.9" fill="#1a1a1a"/>
    <polygon points="5.4,7.7 8,11.4 5.2,13.5 2.4,12.6 2,9.5" fill="#1a1a1a"/>
  </g>
</svg></span>Soccer</button>
        <button type="button" class="sport-btn" data-sport="football" onclick="selectSport(this)"><span class="sport-emoji">🏈</span>Football</button>
        <button type="button" class="sport-btn" data-sport="baseball" onclick="selectSport(this)"><span class="sport-emoji">⚾</span>Baseball</button>
        <button type="button" class="sport-btn" data-sport="softball" onclick="selectSport(this)"><span class="sport-emoji">🥎</span>Softball</button>
        <button type="button" class="sport-btn" data-sport="basketball" onclick="selectSport(this)"><span class="sport-emoji">🏀</span>Basketball</button>
        <button type="button" class="sport-btn" data-sport="waterpolo" onclick="selectSport(this)"><span class="sport-emoji">🤽</span>Water Polo</button>
        <button type="button" class="sport-btn" data-sport="volleyball" onclick="selectSport(this)"><span class="sport-emoji">🏐</span>Volleyball</button>
        <button type="button" class="sport-btn" data-sport="ringette" onclick="selectSport(this)"><span class="sport-emoji"><svg width="28" height="28" viewBox="0 0 28 28" style="display:block;margin:0 auto"><defs><radialGradient id="ringetteGrad" cx="36%" cy="34%" r="58%"><stop offset="0%" stop-color="#7ecbf0"/><stop offset="38%" stop-color="#3a9ad4"/><stop offset="78%" stop-color="#2176ae"/><stop offset="100%" stop-color="#155e8a"/></radialGradient></defs><path fill-rule="evenodd" fill="url(#ringetteGrad)" d="M14,1 A13,13 0 1,0 14.001,1 M14,9 A5,5 0 1,1 13.999,9 Z"/><path fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.8" stroke-linecap="round" d="M6.5,7 A9,9 0 0,1 13,5"/></svg></span>Ringette</button>
        <button type="button" class="sport-btn" data-sport="curling" onclick="selectSport(this)"><span class="sport-emoji">🥌</span>Curling</button>
        <button type="button" class="sport-btn" data-sport="gymnastics" onclick="selectSport(this)"><span class="sport-emoji">🤸</span>Gymnastics</button>
        <button type="button" class="sport-btn" data-sport="golf" onclick="selectSport(this)"><span class="sport-emoji"><svg width="26" height="26" viewBox="0 0 26 26" style="display:block;margin:0 auto">
  <defs>
    <radialGradient id="golfBallGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>
  </defs>
  <circle cx="13" cy="13" r="11" fill="url(#golfBallGrad)" stroke="#bbb" stroke-width="0.5"/>
  <!-- dimples -->
  <circle cx="9"  cy="9"  r="1.3" fill="rgba(0,0,0,0.13)"/>
  <circle cx="13" cy="7"  r="1.3" fill="rgba(0,0,0,0.13)"/>
  <circle cx="17" cy="9"  r="1.3" fill="rgba(0,0,0,0.13)"/>
  <circle cx="19" cy="13" r="1.3" fill="rgba(0,0,0,0.13)"/>
  <circle cx="17" cy="17" r="1.3" fill="rgba(0,0,0,0.13)"/>
  <circle cx="13" cy="19" r="1.3" fill="rgba(0,0,0,0.13)"/>
  <circle cx="9"  cy="17" r="1.3" fill="rgba(0,0,0,0.13)"/>
  <circle cx="7"  cy="13" r="1.3" fill="rgba(0,0,0,0.13)"/>
  <circle cx="11" cy="13" r="1.3" fill="rgba(0,0,0,0.13)"/>
  <circle cx="15" cy="13" r="1.3" fill="rgba(0,0,0,0.13)"/>
</svg></span>Golf</button>
        <button type="button" class="sport-btn" data-sport="figureskating" onclick="selectSport(this)"><span class="sport-emoji"><svg width="26" height="26" viewBox="0 0 26 26" style="display:block;margin:0 auto">
  <!-- Figure skate — side view, white boot, black outline -->
  <!-- Main boot body -->
  <path d="M4,18 L4,10 C4,6 6,4 9,3.5 C10.5,3.2 12,3 12,3 C13,3 14,3.5 14,5 L14,11 C17,10.5 20,11 21,13 C22,14.5 21.5,16.5 20,17.5 L18,18 Z"
        fill="white" stroke="#1a1a1a" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- High ankle back curve -->
  <path d="M4,10 C3.5,8 4.5,5.5 7,4.2"
        fill="none" stroke="#1a1a1a" stroke-width="1.0" stroke-linecap="round"/>
  <!-- Toe cap curve -->
  <path d="M14,11 C16,10 19.5,10.5 21,13"
        fill="none" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Lace eyelets (dots down the front) -->
  <circle cx="12.2" cy="4.8"  r="0.6" fill="#1a1a1a"/>
  <circle cx="12.0" cy="6.5"  r="0.6" fill="#1a1a1a"/>
  <circle cx="11.8" cy="8.2"  r="0.6" fill="#1a1a1a"/>
  <circle cx="11.6" cy="9.8"  r="0.6" fill="#1a1a1a"/>
  <!-- Sole / heel block -->
  <rect x="3.5" y="17.5" width="17" height="2" rx="0.8" fill="white" stroke="#1a1a1a" stroke-width="1.0"/>
  <!-- Heel block (darker) -->
  <rect x="3.5" y="17.5" width="4" height="2.2" rx="0.5" fill="#1a1a1a"/>
  <!-- Blade — long, slightly curved, extending past toe -->
  <path d="M2.5,19.5 Q11,18.8 22,19.5" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>

        <button type="button" class="sport-btn" data-sport="lacrosse" onclick="selectSport(this)"><span class="sport-emoji"><svg width="26" height="26" viewBox="0 0 26 26" style="display:block;margin:0 auto">

  <line x1="7.5"  y1="17" x2="18.5" y2="17" stroke="#8d6e63" stroke-width="1.1" opacity="0.8"/>

  <line x1="9"  y1="2.5" x2="9"  y2="18.5" stroke="#8d6e63" stroke-width="1.1" opacity="0.7"/>
  <line x1="13" y1="2"   x2="13" y2="19"   stroke="#8d6e63" stroke-width="1.1" opacity="0.7"/>
  <line x1="17" y1="2.5" x2="17" y2="18.5" stroke="#8d6e63" stroke-width="1.1" opacity="0.7"/>
  <!-- Handle -->
  <line x1="13" y1="19" x2="13" y2="25" stroke="#5d4037" stroke-width="3" stroke-linecap="round"/>
</svg></span>Lacrosse</button>
        <button type="button" class="sport-btn" data-sport="rugby" onclick="selectSport(this)"><span class="sport-emoji"><svg width="26" height="26" viewBox="0 0 26 26" style="display:block;margin:0 auto">
  <!-- Rugby ball — prolate spheroid, brown with white lace -->
  <ellipse cx="13" cy="13" rx="10.5" ry="6.5" fill="#8B4513" stroke="#5C2D0A" stroke-width="1.0"/>
  <!-- Seam lines -->
  <path d="M2.5,13 Q13,8 23.5,13" fill="none" stroke="#5C2D0A" stroke-width="0.7"/>
  <path d="M2.5,13 Q13,18 23.5,13" fill="none" stroke="#5C2D0A" stroke-width="0.7"/>
  <!-- Lace -->

// ─── State ────────────────────────────────────────────────────────────────────
let currentMode = 'standard';
let currentSport = 'hockey';

function setMode(m) {

  document.getElementById('modeSport').classList.toggle('active', m==='sport');
  document.getElementById('sportSelectorSection').classList.toggle('visible', m==='sport');
}
function selectSport(btn) {
  document.querySelectorAll('.sport-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

}
function addPackage() {
  const c = document.getElementById('packageContainer');

  c.appendChild(r);
}
function removePackage(btn) { btn.parentElement.remove(); }
function togglePrizeImage() {
  const t = document.getElementById('raffleType').value;
  const pig = document.getElementById('prizeImageGroup');
  const piu = document.getElementById('prizeImageUpload');
  const pds = document.getElementById('prizeDescriptionSection');

}
function formatCommaNumber(input) {
  const raw = input.value.replace(/[^0-9]/g, '');
  input.value = raw === '' ? '' : parseInt(raw, 10).toLocaleString('en-US');
}
function toggleAdditional() {
  const ts = document.getElementById('toggleSwitch');

}

// ─── Canvas helpers ────────────────────────────────────────────────────────────
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line='', yPos=y;
  for (let n=0; n<words.length; n++) {
    const testLine = line+words[n]+' ';
    if (ctx.measureText(testLine).width > maxWidth && n>0) {
      ctx.fillText(line,x,yPos); line=words[n]+' '; yPos+=lineHeight;
    } else line=testLine;
  }
  ctx.fillText(line,x,yPos); return yPos;
}

function hasWhiteBackground(img) {
  const o=document.createElement('canvas'); o.width=img.width; o.height=img.height;
  const c=o.getContext('2d'); c.drawImage(img,0,0);
  const pts=[[2,2],[img.width-3,2],[2,img.height-3],[img.width-3,img.height-3],[Math.floor(img.width/2),2]];
  let wc=0;
  for (const [sx,sy] of pts) { try { const p=c.getImageData(sx,sy,1,1).data; if(p[0]>230&&p[1]>230&&p[2]>230) wc++; } catch(e){} }
  return wc>=3;
}

// Rounded rect helper
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// Scalloped rectangle: rounded corners on outside, scalloped on inner edge.
// 50 scallops. Both tickets share the same scallop geometry so bumps/indents
// sit at identical Y positions — outcrop on left lines up with indent on right.
// side: 'left'  → scalloped on right edge (bumps protrude rightward)
// side: 'right' → scalloped on left  edge (bumps indent leftward / same positions)
function scalloppedRect(ctx, x, y, w, h, cornerR, side) {
  const scallops = 50;
  const sR = h / (scallops * 2);   // radius of each semicircle

  ctx.beginPath();

  if (side === 'left') {
    // Start top-left, go clockwise
    ctx.moveTo(x + cornerR, y);
    // Top edge → top-right corner (right edge is the tear side — no round corner)
    ctx.lineTo(x + w, y);
    // RIGHT edge: alternating outward (protrude right) / inward (indent left) arcs
    // i=0 → outward (anticlockwise arc centred ON the edge, bulging right)
    for (let i = 0; i < scallops; i++) {
      const cy = y + sR + i * sR * 2;
      // i even → protrude right: clockwise (anticlockwise=false) sweeps through right side of circle
      // i odd  → indent left:   ccw (anticlockwise=true) sweeps through left side
      const outward = (i % 2 === 0);
      ctx.arc(x + w, cy, sR, -Math.PI / 2, Math.PI / 2, !outward);
    }
    // Bottom-right to bottom-left
    ctx.lineTo(x + w, y + h);
    ctx.lineTo(x + cornerR, y + h);
    ctx.arcTo(x, y + h, x, y + h - cornerR, cornerR);
    ctx.lineTo(x, y + cornerR);
    ctx.arcTo(x, y, x + cornerR, y, cornerR);

  } else {
    // RIGHT ticket: scalloped on LEFT edge.
    // Same Y centres, but bumps indent into the ticket (concave from left).
    // We trace the left edge top→bottom so the same i=0 position gets an inward arc.
    ctx.moveTo(x, y);
    for (let i = 0; i < scallops; i++) {
      const cy = y + sR + i * sR * 2;
      // Match left ticket: i even → left ticket protrudes right, so right ticket indents left
      // indent left = centre on x, arc from top to bottom going anticlockwise (clockwise=false means ccw)
      // i even: left ticket protrudes right → right ticket must indent left → anticlockwise=true
      // i odd:  left ticket indents left   → right ticket protrudes right → anticlockwise=false
      const inward = (i % 2 === 0);
      ctx.arc(x, cy, sR, -Math.PI / 2, Math.PI / 2, inward);
    }
    ctx.lineTo(x, y + h);
    ctx.lineTo(x + w - cornerR, y + h);
    ctx.arcTo(x + w, y + h, x + w, y + h - cornerR, cornerR);
    ctx.lineTo(x + w, y + cornerR);
    ctx.arcTo(x + w, y, x + w - cornerR, y, cornerR);
    ctx.lineTo(x, y);
  }

  ctx.closePath();
}


// ═══════════════════════════════════════════════════════════════════════════════
// BACKGROUND DRAWERS — brightened by ~50% vs v3
// ═══════════════════════════════════════════════════════════════════════════════

function drawHockeyBg(ctx, W, H) {
  // Bright ice
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#e8f4fd'); g.addColorStop(1,'#f6fbff');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#f8f8f8'; ctx.fillRect(0,0,W,22);
  ctx.fillStyle='#dff0fa'; ctx.fillRect(0,22,W,8);
  ctx.fillStyle='#ff4040'; ctx.fillRect(0,30,W,6);
  ctx.fillStyle='#2196f3'; ctx.fillRect(0,36,W,3);
  ctx.save(); ctx.globalAlpha=0.035; ctx.strokeStyle='#99bbdd'; ctx.lineWidth=1;
  for(let i=0;i<H;i+=14){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i+5);ctx.stroke();}
  ctx.restore();
  ctx.strokeStyle='#ff4040'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.strokeStyle='#2196f3'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(W*0.27,0); ctx.lineTo(W*0.27,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.73,0); ctx.lineTo(W*0.73,H); ctx.stroke();
  ctx.strokeStyle='#2196f3'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.arc(W/2,H/2,90,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='#ff4040'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(W/2,H/2,8,0,Math.PI*2); ctx.stroke();
  function drawCrease(gx,gy){
    ctx.strokeStyle='#ff4040'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(gx,gy,55,Math.PI*0.65,Math.PI*1.35,false); ctx.stroke();
    ctx.strokeStyle='#ff4040'; ctx.lineWidth=2; ctx.strokeRect(gx-26,gy-18,52,20);
  }
  drawCrease(W*0.06,H/2); drawCrease(W*0.94,H/2);
  ctx.fillStyle='#ff4040';
  [[W*0.27,H*0.25],[W*0.27,H*0.75],[W*0.73,H*0.25],[W*0.73,H*0.75]].forEach(([fx,fy])=>{
    ctx.beginPath(); ctx.arc(fx,fy,7,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#ff4040'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(fx,fy,40,0,Math.PI*2); ctx.stroke();
  });
  ctx.fillStyle='#2196f3'; ctx.fillRect(0,H-3,W,3);
  ctx.fillStyle='#ff4040'; ctx.fillRect(0,H-9,W,6);
  ctx.fillStyle='#dff0fa'; ctx.fillRect(0,H-17,W,8);
  ctx.fillStyle='#f8f8f8'; ctx.fillRect(0,H-22,W,5);
}

// Hockey and Ringette share same ice background
function drawRingetteBg(ctx, W, H) { drawHockeyBg(ctx, W, H); }

function drawSoccerBg(ctx, W, H) {
  const stripeW=W/12;
  for(let i=0;i<12;i++){
    ctx.fillStyle=i%2===0?'#4caf50':'#66bb6a';
    ctx.fillRect(i*stripeW,0,stripeW,H);
  }
  ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=3;
  ctx.strokeRect(W*0.05,H*0.08,W*0.9,H*0.84);
  ctx.beginPath(); ctx.moveTo(W/2,H*0.08); ctx.lineTo(W/2,H*0.92); ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2,H/2,80,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(W/2,H/2,5,0,Math.PI*2); ctx.fill();
  ctx.strokeRect(W*0.05,H*0.3,W*0.18,H*0.4);
  ctx.strokeRect(W*0.77,H*0.3,W*0.18,H*0.4);
  ctx.strokeRect(W*0.05,H*0.39,W*0.08,H*0.22);
  ctx.strokeRect(W*0.87,H*0.39,W*0.08,H*0.22);
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillRect(W*0.02,H*0.41,W*0.04,H*0.18);
  ctx.fillRect(W*0.94,H*0.41,W*0.04,H*0.18);
  [[W*0.05,H*0.08],[W*0.95,H*0.08],[W*0.05,H*0.92],[W*0.95,H*0.92]].forEach(([cx,cy])=>{
    ctx.beginPath(); ctx.arc(cx,cy,18,0,Math.PI*2); ctx.stroke();
  });
}

function drawFootballBg(ctx, W, H) {
  for(let i=0;i<10;i++){
    ctx.fillStyle=i%2===0?'#43a047':'#4caf50';
    ctx.fillRect(i*(W/10),0,W/10,H);
  }
  ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=2.5;
  ctx.strokeRect(W*0.04,H*0.06,W*0.92,H*0.88);
  for(let x=0.14;x<0.96;x+=0.09){
    ctx.beginPath(); ctx.moveTo(W*x,H*0.06); ctx.lineTo(W*x,H*0.94); ctx.stroke();
  }
  ctx.lineWidth=4; ctx.strokeStyle='rgba(255,255,255,0.95)';
  ctx.beginPath(); ctx.moveTo(W/2,H*0.06); ctx.lineTo(W/2,H*0.94); ctx.stroke();
  ctx.lineWidth=2; ctx.strokeStyle='rgba(255,255,255,0.65)';
  for(let x=0.04;x<0.96;x+=0.045){
    const px=W*x;
    ctx.beginPath(); ctx.moveTo(px,H*0.38); ctx.lineTo(px,H*0.42); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px,H*0.58); ctx.lineTo(px,H*0.62); ctx.stroke();
  }
  ctx.fillStyle='rgba(21,101,192,0.3)'; ctx.fillRect(W*0.04,H*0.06,W*0.09,H*0.88);
  ctx.fillStyle='rgba(192,21,21,0.3)'; ctx.fillRect(W*0.87,H*0.06,W*0.09,H*0.88);
}

function drawBaseballBg(ctx, W, H) {
  ctx.fillStyle='#4a9a4a'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#a0724a';
  ctx.beginPath(); ctx.arc(W/2,H+100,H*1.35,Math.PI,2*Math.PI); ctx.fill();
  ctx.fillStyle='#d4a06a';
  ctx.beginPath(); ctx.arc(W/2,H*0.85,H*0.68,Math.PI,2*Math.PI); ctx.fill();
  ctx.fillStyle='#5aaa5a';
  ctx.beginPath(); ctx.arc(W/2,H*0.85,H*0.52,Math.PI,2*Math.PI); ctx.fill();
  ctx.save(); ctx.globalAlpha=0.15; ctx.strokeStyle='#006600'; ctx.lineWidth=18;
  for(let i=0;i<8;i++){ctx.beginPath(); ctx.arc(W/2,H*0.85,(i+2)*55,Math.PI,2*Math.PI); ctx.stroke();}
  ctx.restore();
  const bx=W/2,by=H*0.85,bd=H*0.3;
  const bases=[[bx,by-bd],[bx+bd,by],[bx,by],[bx-bd,by]];
  ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(bases[0][0],bases[0][1]);
  bases.forEach(([bx2,by2])=>ctx.lineTo(bx2,by2)); ctx.closePath(); ctx.stroke();
  ctx.fillStyle='white';
  bases.forEach(([bx2,by2])=>{ctx.beginPath();ctx.arc(bx2,by2,10,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='#d4a06a'; ctx.beginPath(); ctx.arc(W/2,by-bd*0.45,20,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(W*0.05,H*0.05); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(W*0.95,H*0.05); ctx.stroke();
}

function drawSoftballBg(ctx, W, H) {
  ctx.fillStyle='#5aaa5a'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#b07040';
  ctx.beginPath(); ctx.arc(W/2,H+100,H*1.35,Math.PI,2*Math.PI); ctx.fill();
  ctx.fillStyle='#d4a46a';
  ctx.beginPath(); ctx.arc(W/2,H*0.85,H*0.65,Math.PI,2*Math.PI); ctx.fill();
  ctx.fillStyle='#66aa66';
  ctx.beginPath(); ctx.arc(W/2,H*0.85,H*0.5,Math.PI,2*Math.PI); ctx.fill();
  const bx=W/2,by=H*0.85,bd=H*0.28;
  const bases=[[bx,by-bd],[bx+bd,by],[bx,by],[bx-bd,by]];
  ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(bases[0][0],bases[0][1]);
  bases.forEach(([bx2,by2])=>ctx.lineTo(bx2,by2)); ctx.closePath(); ctx.stroke();
  ctx.fillStyle='white';
  bases.forEach(([bx2,by2])=>{ctx.beginPath();ctx.arc(bx2,by2,10,0,Math.PI*2);ctx.fill();});
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(W*0.05,H*0.05); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(W*0.95,H*0.05); ctx.stroke();
}

function drawBasketballBg(ctx, W, H) {
  for(let i=0;i<H/22;i++){
    const shade=190+(i%3)*8;
    ctx.fillStyle=`rgb(${shade+20},${Math.round(shade*0.82)},${Math.round(shade*0.55)})`;
    ctx.fillRect(0,i*22,W,21);
  }
  ctx.save(); ctx.globalAlpha=0.06; ctx.strokeStyle='#000'; ctx.lineWidth=1;
  for(let y=0;y<H;y+=22){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
  ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=3;
  ctx.strokeRect(W*0.04,H*0.07,W*0.92,H*0.86);
  ctx.beginPath(); ctx.moveTo(W/2,H*0.07); ctx.lineTo(W/2,H*0.93); ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2,H/2,75,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(255,160,0,0.8)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(W/2,H/2,10,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(W*0.14,H/2,H*0.42,-Math.PI/2.2,Math.PI/2.2); ctx.stroke();
  ctx.beginPath(); ctx.arc(W*0.86,H/2,H*0.42,Math.PI-Math.PI/2.2,Math.PI+Math.PI/2.2); ctx.stroke();
  ctx.strokeRect(W*0.04,H*0.33,W*0.2,H*0.34);
  ctx.strokeRect(W*0.76,H*0.33,W*0.2,H*0.34);
  ctx.beginPath(); ctx.arc(W*0.24,H/2,55,0,Math.PI*2); ctx.stroke();

// ═══════════════════════════════════════════════════════════════════════════════
// TICKET FILL FUNCTIONS
// Each sport's shape is large, central, and represents the ball/equipment.
// All textures are drawn AFTER ctx.clip() is already set by caller.
// ═══════════════════════════════════════════════════════════════════════════════

// Helper: draw a sport shape path (no fill/stroke — caller does that)
// Returns { cx, cy, shapeR } describing the shape centre and radius for content layout
function sportShapePath(ctx, x, y, w, h, sport) {
  const cx=x+w/2, cy=y+h/2;
  const R=Math.min(w,h)*0.40;
  switch(sport){
    case 'soccer': {
      const PR=R*1.05;
      ctx.beginPath();
      for(let i=0;i<5;i++){const a=(i*2*Math.PI/5)-Math.PI/2; i===0?ctx.moveTo(cx+Math.cos(a)*PR,cy+Math.sin(a)*PR):ctx.lineTo(cx+Math.cos(a)*PR,cy+Math.sin(a)*PR);}
      ctx.closePath();
      return {cx,cy,R:PR*0.85};
    }
    case 'football': {
      ctx.beginPath();
      ctx.ellipse(cx,cy,R*1.35,R*0.78,0,0,Math.PI*2);
      ctx.closePath();
      return {cx,cy,R:R*0.78};
    }
    default: {
      ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.closePath();
      return {cx,cy,R};
    }
  }
}

// Draw the sport shape (backdrop behind logo / content)
// accentColor: [r,g,b] from uploaded image
function drawSportBackdrop(ctx, x, y, w, h, sportKey, accentColor, darkestColor) {
  const [r,g,b]=accentColor;
  const shapeInfo=sportShapePath(ctx,x,y,w,h,sportKey);
  // Solid white fill — keeps logo white background invisible (same as standard banner)
  ctx.fillStyle='#ffffff'; ctx.fill();
  // Stroke: soccer gets darkest logo colour (bold), others get thin accent ring
  if(sportKey==='soccer' && darkestColor){
    const [dr,dg,db]=darkestColor;
    ctx.strokeStyle=`rgb(${dr},${dg},${db})`; ctx.lineWidth=3; ctx.stroke();
  } else {
    ctx.strokeStyle=`rgba(${r},${g},${b},0.55)`; ctx.lineWidth=1.5; ctx.stroke();
  }
  return shapeInfo;
}

// Clip future drawing to the sport shape
function clipToSportShape(ctx, x, y, w, h, sportKey) {
  sportShapePath(ctx,x,y,w,h,sportKey);
  ctx.clip();
  return sportShapePath(ctx,x,y,w,h,sportKey);
}

// Get dominant color from an image element
function getDominantColor(img) {
  try {
    const ct=new ColorThief(); const p=ct.getPalette(img,6);
    // Pick most saturated non-too-dark color
    let best=p[0], bestScore=-1;
    for(const [r,g,b] of p){
      const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
      const sat=mx===0?0:(mx-mn)/mx;
      const bri=mx/255;
      if(bri<0.08) continue;
      const score=sat*(0.4+bri*0.6);
      if(score>bestScore){bestScore=score;best=[r,g,b];}
    }
    return best;
  } catch(e){ return [80,80,80]; }
}

// ── Background removal ────────────────────────────────────────────────────────
// Removes the outer background using BFS flood-fill from image edges only.
// Does NOT touch interior pixels — avoids destroying logo colours that happen
// to be similar to the background.
function removeImageBackground(img) {
  const oc=document.createElement('canvas');
  oc.width=img.width; oc.height=img.height;
  const oc2=oc.getContext('2d');
  oc2.drawImage(img,0,0);
  const id=oc2.getImageData(0,0,oc.width,oc.height);
  const d=id.data, W=oc.width, H=oc.height;

  // Sample border pixels to detect background colour
  const samplePts=[
    [0,0],[W-1,0],[0,H-1],[W-1,H-1],
    [Math.floor(W/2),0],[0,Math.floor(H/2)],
    [W-1,Math.floor(H/2)],[Math.floor(W/2),H-1],
    [2,2],[W-3,2],[2,H-3],[W-3,H-3]
  ];
  function getPixel(x,y){const i=(y*W+x)*4;return[d[i],d[i+1],d[i+2],d[i+3]];}
  const bgSamples=samplePts.map(([x,y])=>getPixel(x,y)).filter(p=>p[3]>200);

  if(bgSamples.length===0) return oc; // already transparent

  // Average background colour
  const bgR=bgSamples.reduce((s,p)=>s+p[0],0)/bgSamples.length;
  const bgG=bgSamples.reduce((s,p)=>s+p[1],0)/bgSamples.length;
  const bgB=bgSamples.reduce((s,p)=>s+p[2],0)/bgSamples.length;

  // Tight tolerance — only remove pixels very close to the bg colour
  // Lower value = less aggressive = safer for logos with colours near background
  const tolerance=28;

  // BFS flood-fill strictly from border pixels outward — never touches interior
  const visited=new Uint8Array(W*H);
  const queue=[];
  function enqueue(x,y){
    if(x<0||x>=W||y<0||y>=H) return;
    const idx=y*W+x;
    if(visited[idx]) return;
    const pi=idx*4;
    if(d[pi+3]<10){ visited[idx]=1; return; } // already transparent — propagate but don't mark
    const dr=d[pi]-bgR, dg=d[pi+1]-bgG, db=d[pi+2]-bgB;
    const dist=Math.sqrt(dr*dr+dg*dg+db*db);
    if(dist<tolerance){
      visited[idx]=1;
      queue.push(x,y);
    }
  }
  // Seed only from the outermost border row/column
  for(let x=0;x<W;x++){enqueue(x,0);enqueue(x,H-1);}
  for(let y=1;y<H-1;y++){enqueue(0,y);enqueue(W-1,y);}

  let qi=0;
  while(qi<queue.length){
    const x=queue[qi++], y=queue[qi++];
    const pi=(y*W+x)*4;
    const dr=d[pi]-bgR, dg=d[pi+1]-bgG, db=d[pi+2]-bgB;
    const dist=Math.sqrt(dr*dr+dg*dg+db*db);
    // Feather: pixels right at tolerance edge get partial alpha
    const alpha=Math.min(255, Math.round((dist/tolerance)*255*2.0));
    d[pi+3]=Math.min(d[pi+3], alpha);
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>enqueue(x+dx,y+dy));
  }

  // NO global second pass — do not touch non-connected interior pixels
  oc2.putImageData(id,0,0);
  return oc;
}

// ── HOCKEY PUCK ──────────────────────────────────────────────────────────────
function fillPuck(ctx, x, y, w, h) {
  const g=ctx.createLinearGradient(x,y,x+w,y+h);
  g.addColorStop(0,'#2a2a2a'); g.addColorStop(0.5,'#111'); g.addColorStop(1,'#222');
  ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
  // Tread lines
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
  for(let i=0;i<14;i++){
    const ly2=y+h*0.08+i*(h*0.84/14);
    ctx.beginPath(); ctx.moveTo(x,ly2); ctx.lineTo(x+w,ly2); ctx.stroke();
  }
  // Edge ring
  ctx.strokeStyle='rgba(80,80,80,0.6)'; ctx.lineWidth=10;
  ctx.beginPath(); ctx.arc(x+w*0.5,y+h*0.5,Math.min(w,h)*0.43,0,Math.PI*2); ctx.stroke();
  // Sheen
  const sheen=ctx.createRadialGradient(x+w*0.35,y+h*0.25,5,x+w*0.35,y+h*0.25,w*0.55);
  sheen.addColorStop(0,'rgba(255,255,255,0.13)'); sheen.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sheen; ctx.fillRect(x,y,w,h);
}
const fillPuckLeft=fillPuck, fillPuckRight=fillPuck;

// ── SOCCER BALL — classic black-and-white pentagon patches ───────────────────
// Shared helper: draw B&W soccer ball centred at (cx,cy) with given radius r
function drawSoccerBallBW(ctx, cx, cy, r) {
  const pR = r * 0.295; // circumscribed pentagon patch radius
  // stroke width scales with ball size
  const sw = Math.max(0.7, r * 0.028);
  function pentagon(px, py, pr2, filled) {
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=(i*2*Math.PI/5)-Math.PI/2;
      if(i===0) ctx.moveTo(px+Math.cos(a)*pr2, py+Math.sin(a)*pr2);
      else       ctx.lineTo(px+Math.cos(a)*pr2, py+Math.sin(a)*pr2);
    }
    ctx.closePath();
    if(filled){ ctx.fillStyle='#1a1a1a'; ctx.fill(); }
    ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=sw; ctx.stroke();
  }
  pentagon(cx, cy, pR, true); // centre patch
  const d = r * 0.595;        // distance from ball centre to surrounding patch centres
  for(let j=0;j<5;j++){
    const a=(j*2*Math.PI/5)-Math.PI/2;
    pentagon(cx+Math.cos(a)*d, cy+Math.sin(a)*d, pR, true);
  }
}
function fillSoccerBall(ctx, x, y, w, h) {
  ctx.fillStyle='#f5f5f5'; ctx.fillRect(x,y,w,h);
  drawSoccerBallBW(ctx, x+w/2, y+h/2, Math.min(w,h)*0.38);
  const sheen=ctx.createRadialGradient(x+w*0.32,y+h*0.26,4,x+w/2,y+h/2,Math.min(w,h)*0.42);
  sheen.addColorStop(0,'rgba(255,255,255,0.45)'); sheen.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sheen; ctx.fillRect(x,y,w,h);
}
const fillSoccerBallLeft=fillSoccerBall, fillSoccerBallRight=fillSoccerBall;

// ── FOOTBALL ─────────────────────────────────────────────────────────────────
function fillFootball(ctx, x, y, w, h) {
  const g=ctx.createLinearGradient(x,y,x+w,y+h);
  g.addColorStop(0,'#8b4513'); g.addColorStop(0.4,'#a0522d'); g.addColorStop(0.7,'#8b4513'); g.addColorStop(1,'#7a3c1a');
  ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
  // Leather pebble texture — subtle
  ctx.globalAlpha=0.06; ctx.strokeStyle='#3a1500'; ctx.lineWidth=0.5;
  for(let i=0;i<18;i++) for(let j=0;j<12;j++){ctx.beginPath();ctx.arc(x+i*(w/18)+5,y+j*(h/12)+5,3,0,Math.PI*2);ctx.stroke();}
  ctx.globalAlpha=1;
  // No laces — they span the full ticket height and obscure the header text
  const sheen=ctx.createRadialGradient(x+w*0.3,y+h*0.25,5,x+w*0.3,y+h*0.25,w*0.55);
  sheen.addColorStop(0,'rgba(255,200,150,0.22)'); sheen.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sheen; ctx.fillRect(x,y,w,h);
}
const fillFootballLeft=fillFootball, fillFootballRight=fillFootball;

// ── BASEBALL ─────────────────────────────────────────────────────────────────
// Red stitching runs down the OUTER edges of the ticket shape (near the scallops)
function fillBaseball(ctx, x, y, w, h) {
  ctx.fillStyle='#f9f6f1'; ctx.fillRect(x,y,w,h);
  // Curved stitching along left and right edges of the ticket
  ctx.strokeStyle='#cc1111'; ctx.lineWidth=2.5;
  for(let i=0;i<14;i++){
    const t=i/13;
    const sy=y+h*(0.05+t*0.9);
    // Left edge stitches
    ctx.beginPath(); ctx.moveTo(x+8,sy); ctx.lineTo(x+16,sy+7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+8,sy+7); ctx.lineTo(x+16,sy); ctx.stroke();
    // Right edge stitches
    ctx.beginPath(); ctx.moveTo(x+w-8,sy); ctx.lineTo(x+w-16,sy+7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+w-8,sy+7); ctx.lineTo(x+w-16,sy); ctx.stroke();
  }
  const sheen=ctx.createRadialGradient(x+w*0.35,y+h*0.28,5,x+w*0.35,y+h*0.28,w*0.5);
  sheen.addColorStop(0,'rgba(255,255,255,0.55)'); sheen.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sheen; ctx.fillRect(x,y,w,h);
}
const fillBaseballLeft=fillBaseball, fillBaseballRight=fillBaseball;

// ── SOFTBALL ─────────────────────────────────────────────────────────────────
function fillSoftball(ctx, x, y, w, h) {
  ctx.fillStyle='#fffce8'; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#e91e63'; ctx.lineWidth=2.5;
  for(let i=0;i<14;i++){
    const t=i/13;
    const sy=y+h*(0.05+t*0.9);
    ctx.beginPath(); ctx.moveTo(x+8,sy); ctx.lineTo(x+16,sy+7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+8,sy+7); ctx.lineTo(x+16,sy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+w-8,sy); ctx.lineTo(x+w-16,sy+7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+w-8,sy+7); ctx.lineTo(x+w-16,sy); ctx.stroke();
  }
  const sheen=ctx.createRadialGradient(x+w*0.35,y+h*0.28,5,x+w*0.35,y+h*0.28,w*0.5);
  sheen.addColorStop(0,'rgba(255,255,255,0.55)'); sheen.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sheen; ctx.fillRect(x,y,w,h);
}
const fillSoftballLeft=fillSoftball, fillSoftballRight=fillSoftball;

// ── BASKETBALL ───────────────────────────────────────────────────────────────
function fillBasketball(ctx, x, y, w, h) {
  const g=ctx.createLinearGradient(x,y,x+w,y+h);
  g.addColorStop(0,'#e65100'); g.addColorStop(0.5,'#f57c00'); g.addColorStop(1,'#e65100');

// ── FIGURE SKATING ────────────────────────────────────────────────────────────
function drawFigureSkatingBg(ctx, W, H) {
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#e3f2fd'); g.addColorStop(0.5,'#bbdefb'); g.addColorStop(1,'#90caf9');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  for(let y=H*0.3;y<H;y+=22){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y+8);ctx.stroke();}
  ctx.restore();
  ctx.strokeStyle='rgba(25,118,210,0.55)'; ctx.lineWidth=3;
  ctx.beginPath(); roundRect(ctx,W*0.04,H*0.06,W*0.92,H*0.88,18); ctx.stroke();
  // Skate trace figure-8 loops (dashed via short segments)
  ctx.save(); ctx.globalAlpha=0.22; ctx.strokeStyle='#1565c0'; ctx.lineWidth=1.5;
  function dashedEllipse(cx,cy,rx2,ry2,segments){
    for(let i=0;i<segments;i+=2){
      const a1=i*(2*Math.PI/segments), a2=(i+1)*(2*Math.PI/segments);
      const steps=8;
      ctx.beginPath();
      for(let s=0;s<=steps;s++){const a=a1+(a2-a1)*(s/steps);if(s===0)ctx.moveTo(cx+Math.cos(a)*rx2,cy+Math.sin(a)*ry2);else ctx.lineTo(cx+Math.cos(a)*rx2,cy+Math.sin(a)*ry2);}
      ctx.stroke();
    }
  }
  dashedEllipse(W*0.35,H*0.48,W*0.22,H*0.2,16);
  dashedEllipse(W*0.65,H*0.52,W*0.22,H*0.2,16);
  ctx.restore();
  ctx.strokeStyle='rgba(211,47,47,0.6)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(W*0.04,H/2); ctx.lineTo(W*0.96,H/2); ctx.stroke();
  ctx.strokeStyle='rgba(21,101,192,0.5)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(W*0.04,H*0.33); ctx.lineTo(W*0.96,H*0.33); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.04,H*0.67); ctx.lineTo(W*0.96,H*0.67); ctx.stroke();
}
function fillFigureSkating(ctx, x, y, w, h) {
  const g=ctx.createLinearGradient(x,y,x,y+h);

  ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
  ctx.save(); ctx.globalAlpha=0.12; ctx.strokeStyle='#90caf9'; ctx.lineWidth=0.8;
  for(let i=0;i<8;i++){

  for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(bx+w*0.18+i*3,by);ctx.lineTo(bx+w*0.19+i*3,by-5);ctx.stroke();}
}

// ── RUGBY ─────────────────────────────────────────────────────────────────────
function drawRugbyBg(ctx, W, H) {

  const g=ctx.createLinearGradient(0,0,0,H);

  function drawPosts(cx) {

  ctx.restore();
  // Rugby ball centred
  const bx=x+w/2, by=y+h/2, brx=Math.min(w,h)*0.28, bry=Math.min(w,h)*0.17;
  const bg2=ctx.createRadialGradient(bx-brx*0.3,by-bry*0.4,brx*0.1,bx,by,brx);
  bg2.addColorStop(0,'#a0522d'); bg2.addColorStop(1,'#6b2d0a');
  ctx.fillStyle=bg2;
  ctx.beginPath(); ctx.ellipse(bx,by,brx,bry,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#5C2D0A'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.ellipse(bx,by,brx,bry,0,0,Math.PI*2); ctx.stroke();
  // Seam lines
  ctx.strokeStyle='rgba(60,20,0,0.45)'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.moveTo(bx-brx,by); ctx.quadraticCurveTo(bx,by-bry*0.7,bx+brx,by); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx-brx,by); ctx.quadraticCurveTo(bx,by+bry*0.7,bx+brx,by); ctx.stroke();
  // Lace
  ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(bx,by-bry*0.7); ctx.lineTo(bx,by+bry*0.7); ctx.stroke();
  ctx.lineWidth=1;
  [-0.35,0,0.35].forEach(t=>{const ly2=by+t*bry*1.1;ctx.beginPath();ctx.moveTo(bx-brx*0.22,ly2);ctx.lineTo(bx+brx*0.22,ly2);ctx.stroke();});
}
const fillRugbyLeft=fillRugby, fillRugbyRight=fillRugby;

// ── TENNIS ───────────────────────────────────────────────────────────────────
function drawTennisBg(ctx, W, H) {
  // Terracotta clay court
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#c1440e'); g.addColorStop(0.5,'#d4520f'); g.addColorStop(1,'#b03a0a');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // Subtle texture
  ctx.save(); ctx.globalAlpha=0.05;
  for(let i=0;i<H;i+=4){ctx.fillStyle=i%8?'#000':'#fff';ctx.fillRect(0,i,W,2);}
  ctx.restore();
  // Court lines
  ctx.strokeStyle='rgba(255,255,255,0.88)'; ctx.lineWidth=2;
  // Outer boundary
  ctx.strokeRect(W*0.04,H*0.06,W*0.92,H*0.88);
  // Singles sidelines
  ctx.beginPath(); ctx.moveTo(W*0.12,H*0.06); ctx.lineTo(W*0.12,H*0.94); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.88,H*0.06); ctx.lineTo(W*0.88,H*0.94); ctx.stroke();
  // Service boxes
  ctx.beginPath(); ctx.moveTo(W*0.12,H*0.06+H*0.38); ctx.lineTo(W*0.88,H*0.06+H*0.38); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.12,H*0.94-H*0.38); ctx.lineTo(W*0.88,H*0.94-H*0.38); ctx.stroke();
  // Centre service line
  ctx.beginPath(); ctx.moveTo(W/2,H*0.06+H*0.38); ctx.lineTo(W/2,H*0.94-H*0.38); ctx.stroke();
  // Net — thicker
  ctx.strokeStyle='rgba(255,255,255,0.95)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(W*0.04,H/2); ctx.lineTo(W*0.96,H/2); ctx.stroke();
  // Net posts
  ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(W*0.04,H*0.35); ctx.lineTo(W*0.04,H*0.65); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.96,H*0.35); ctx.lineTo(W*0.96,H*0.65); ctx.stroke();
  // Net mesh suggestion
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=0.7;
  for(let nx=W*0.04;nx<W*0.96;nx+=W*0.06){
    ctx.beginPath(); ctx.moveTo(nx,H*0.35); ctx.lineTo(nx,H*0.65); ctx.stroke();
  }
}
function fillTennis(ctx, x, y, w, h) {
  // Grass court green background
  ctx.fillStyle='#3a7d44'; ctx.fillRect(x,y,w,h);
  ctx.save(); ctx.globalAlpha=0.07; ctx.strokeStyle='#1a4a22'; ctx.lineWidth=1;
  for(let i=0;i<8;i++){ctx.beginPath();ctx.moveTo(x+i*(w/8),y);ctx.lineTo(x+i*(w/8),y+h);ctx.stroke();}
  ctx.restore();
  // Tennis ball centred
  const bx=x+w/2, by=y+h/2, br=Math.min(w,h)*0.18;
  const bg2=ctx.createRadialGradient(bx-br*0.3,by-br*0.3,br*0.1,bx,by,br);
  bg2.addColorStop(0,'#e0ee00'); bg2.addColorStop(1,'#b8c800');
  ctx.fillStyle=bg2;
  ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#9aaa00'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.stroke();
  // Seam curves
  ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=1.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(bx-br*0.55,by-br*0.7); ctx.quadraticCurveTo(bx-br*1.0,by,bx-br*0.55,by+br*0.7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx+br*0.55,by-br*0.7); ctx.quadraticCurveTo(bx+br*1.0,by,bx+br*0.55,by+br*0.7); ctx.stroke();
}

// ─── STANDARD POSTER (original) ───────────────────────────────────────────────
function generateStandardPoster() {
  const canvas=document.getElementById('preview');
  const ctx=canvas.getContext('2d');
  const orgName=document.getElementById('orgName').value||'Your Organization';
  const raffleType=document.getElementById('raffleType').value;
  const showDetails=document.getElementById('toggleSwitch').classList.contains('active');
  const file=document.getElementById('logoUpload').files[0];
  if(!file){alert('Please upload a logo/image');return;}

  const prizeFileEarly=raffleType==='prize'?document.getElementById('prizeImageUpload').files[0]:null;
  const hasPrizeFileEarly=prizeFileEarly&&!document.getElementById('prizeImageUpload').disabled;

  function doRender(preloadedPrizeImg) {
    const img=new Image();
    img.onload=()=>{
      const colorThief=new ColorThief();
      const palette=colorThief.getPalette(img,8);
      function getSat(r,g,b){const mx=Math.max(r,g,b),mn=Math.min(r,g,b);return mx===0?0:(mx-mn)/mx;}
      function getBri(r,g,b){return Math.max(r,g,b)/255;}
      let totalSat=0;
      for(const c of palette) totalSat+=getSat(...c);
      const isGray=(totalSat/palette.length)<0.15;
      let best=palette[0], bestS=-1;
      for(const c of palette){
        const[r,g,b]=c, sat=getSat(r,g,b), bri=getBri(r,g,b);
        if(bri>0.85) continue;
        const score=isGray?1-bri:sat*(1-bri*0.5);
        if(score>bestS){bestS=score;best=c;}
      }
      const primaryColor=`rgb(${best.join(',')})`;
      const secondaryColor=`rgb(${palette[1].join(',')})`;
      const accentColor=`rgb(${palette[2].join(',')})`;
      const colorDiff=Math.sqrt(Math.pow(palette[0][0]-palette[1][0],2)+Math.pow(palette[0][1]-palette[1][1],2)+Math.pow(palette[0][2]-palette[1][2],2));
      const isSingleColored=colorDiff<50;
      const W=canvas.width, H=canvas.height;
      const g=ctx.createLinearGradient(0,0,W,H);
      g.addColorStop(0,secondaryColor); g.addColorStop(0.5,accentColor); g.addColorStop(1,primaryColor);
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      ctx.save(); ctx.globalAlpha=0.12; ctx.strokeStyle='white'; ctx.lineWidth=1.5;
      for(let i=-H;i<W+H;i+=28){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+H,H);ctx.stroke();}
      ctx.restore();
      const vig=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.9);
      vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.35)');
      ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
      const margin=44, gap=60, tw=(W-margin*2-gap)/2, th=H-margin*2;
      const lx=margin, rx=margin+tw+gap, ry=tw;
      const lWhite=hasWhiteBackground(img);
      const rWhite=preloadedPrizeImg&&hasWhiteBackground(preloadedPrizeImg);
      drawStdTicket(ctx,lx,margin,tw,th,'left',lWhite?'#ffffff':null);
      drawStdTicket(ctx,rx,margin,tw,th,'right',rWhite?'#ffffff':null);
      // Logo
      const ls=280, lx2=lx+(tw-ls)/2, ly2=margin+55;
      const sc=Math.min(ls/img.width,ls/img.height);
      ctx.drawImage(img,lx2+(ls-img.width*sc)/2,ly2+(ls-img.height*sc)/2,img.width*sc,img.height*sc);
      const divY=ly2+ls+20;
      drawOrnDiv(ctx,lx+tw/2,divY,tw*0.35,primaryColor);
      ctx.fillStyle=primaryColor; ctx.font='bold 30px "Helvetica Neue",Helvetica,Arial,sans-serif';
      ctx.textAlign='center';
      wrapText(ctx,orgName.toUpperCase(),lx+tw/2,divY+36,tw-70,36);
      if(showDetails){
        const lic=document.getElementById('licenceNumber').value;
        if(lic){ctx.fillStyle=primaryColor;ctx.globalAlpha=0.65;ctx.font='14px "Helvetica Neue",Helvetica,Arial,sans-serif';ctx.textAlign='center';ctx.fillText(`Licence ${lic}`,lx+tw/2,margin+th-24);ctx.globalAlpha=1;}
      }
      const hasPrize=raffleType==='prize'&&document.getElementById('prizeImageUpload').files[0]&&!document.getElementById('prizeImageUpload').disabled;
      const enlarge=!showDetails&&!hasPrize, sm=enlarge?1.2:1.0;
      const rtx=rx+tw/2, rty=enlarge?margin+th/2-20:(raffleType==='5050'?220:180);
      ctx.fillStyle=primaryColor; ctx.textAlign='center'; ctx.strokeStyle=secondaryColor; ctx.lineWidth=0.5;
      const mainTxt=raffleType==='5050'?'50/50':'PRIZE';
      ctx.font=`bold ${Math.round((raffleType==='5050'?119:120)*sm)}px Impact,"Arial Black",sans-serif`;
      const lts=raffleType==='5050'?6*sm:8*sm;
      const ltw=mainTxt.split('').reduce((s,l)=>s+ctx.measureText(l).width+lts,0)-lts;
      let xp=rtx-ltw/2;
      mainTxt.split('').forEach(l=>{const lw=ctx.measureText(l).width;if(!isSingleColored)ctx.strokeText(l,xp+lw/2,rty);ctx.fillText(l,xp+lw/2,rty);xp+=lw+lts;});
      const subY=rty+Math.round(64*sm);
      ctx.font=`bold ${Math.round(48*sm)}px "Helvetica Neue",Helvetica,Arial,sans-serif`;
      if(!isSingleColored)ctx.strokeText('RAFFLE',rtx,subY);
      ctx.fillText('RAFFLE',rtx,subY);
      drawOrnDiv(ctx,rtx,subY+Math.round(18*sm),tw*0.3,primaryColor);
      let dsY=rty+Math.round((raffleType==='5050'?102:140)*sm);
      if(raffleType==='prize'&&hasPrize){
        const pf=document.getElementById('prizeImageUpload').files[0];
        const pi=preloadedPrizeImg||new Image();
        function rp(){
          // Proper fit: scale to fill available space while preserving aspect ratio
          const mpw=tw-80, maxH=showDetails?170:260;
          const ia=pi.width/pi.height, ba=mpw/maxH;
          let pw,ph; if(ia>ba){pw=mpw;ph=pw/ia;}else{ph=maxH;pw=ph*ia;}
          // Remove white/light background
          const off=document.createElement('canvas'); off.width=pi.width; off.height=pi.height;
          const offCtx=off.getContext('2d'); offCtx.drawImage(pi,0,0);
          const imgData=offCtx.getImageData(0,0,pi.width,pi.height); const d=imgData.data;
          for(let p=0;p<d.length;p+=4){
            const r=d[p],g=d[p+1],b=d[p+2],brightness=(r+g+b)/3,maxC=Math.max(r,g,b),minC=Math.min(r,g,b),sat=maxC===0?0:(maxC-minC)/maxC;
            if(brightness>210&&sat<0.15){d[p+3]=0;}
          }
          offCtx.putImageData(imgData,0,0);
          ctx.drawImage(off, rtx-pw/2, dsY, pw, ph);
          dsY=dsY+ph+16;
          drawStdDetails(ctx,showDetails,rx,tw,margin,th,rtx,dsY,raffleType,primaryColor);
        }
        if(preloadedPrizeImg)rp();else{pi.onload=rp;pi.src=URL.createObjectURL(pf);}
        return;
      }
      drawStdDetails(ctx,showDetails,rx,tw,margin,th,rtx,dsY,raffleType,primaryColor);
    };
    img.src=URL.createObjectURL(file);
  }
  if(hasPrizeFileEarly){const ep=new Image();ep.onload=()=>doRender(ep);ep.src=URL.createObjectURL(prizeFileEarly);}
  else doRender(null);
}

function drawStdTicket(ctx,x,y,w,h,side,fill){
  const cr=22;
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.52)';ctx.shadowBlur=26;ctx.shadowOffsetX=3;ctx.shadowOffsetY=8;ctx.fillStyle='white';scalloppedRect(ctx,x,y,w,h,cr,side);ctx.fill();ctx.restore();
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.22)';ctx.shadowBlur=55;ctx.shadowOffsetX=0;ctx.shadowOffsetY=18;ctx.fillStyle='white';scalloppedRect(ctx,x,y,w,h,cr,side);ctx.fill();ctx.restore();
  ctx.save();
  if(fill){ctx.fillStyle=fill;}else{const pg=ctx.createLinearGradient(x,y,x,y+h);pg.addColorStop(0,'#fff');pg.addColorStop(0.3,'#fdfbf8');pg.addColorStop(0.7,'#faf7f2');pg.addColorStop(1,'#f4f0ea');ctx.fillStyle=pg;}
  scalloppedRect(ctx,x,y,w,h,cr,side);ctx.fill();ctx.restore();
  ctx.save();scalloppedRect(ctx,x,y,w,h,cr,side);ctx.clip();ctx.globalAlpha=0.022;ctx.strokeStyle='#666';ctx.lineWidth=0.5;for(let r=y+3;r<y+h;r+=4){ctx.beginPath();ctx.moveTo(x,r);ctx.lineTo(x+w,r);ctx.stroke();}ctx.restore();
  ctx.save();ctx.globalAlpha=0.65;ctx.strokeStyle='rgba(255,255,255,0.95)';ctx.lineWidth=1.5;scalloppedRect(ctx,x+1.5,y+1.5,w-3,h-3,Math.max(1,cr-1.5),side);ctx.stroke();ctx.restore();
  ctx.save();ctx.globalAlpha=0.14;ctx.strokeStyle='rgba(0,0,0,1)';ctx.lineWidth=1;scalloppedRect(ctx,x+3,y+3,w-6,h-6,Math.max(1,cr-3),side);ctx.stroke();ctx.restore();
  ctx.save();ctx.strokeStyle='rgba(160,145,120,0.4)';ctx.lineWidth=1;scalloppedRect(ctx,x,y,w,h,cr,side);ctx.stroke();ctx.restore();
}

function drawOrnDiv(ctx,cx,y,hw,color){
  ctx.save();ctx.globalAlpha=0.4;ctx.strokeStyle=color;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx-hw,y);ctx.lineTo(cx-8,y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+8,y);ctx.lineTo(cx+hw,y);ctx.stroke();
  ctx.fillStyle=color;ctx.globalAlpha=0.6;ctx.save();ctx.translate(cx,y);ctx.rotate(Math.PI/4);ctx.fillRect(-4,-4,8,8);ctx.restore();
  ctx.restore();
}

function drawStdDetails(ctx,showDetails,rx,tw,margin,th,rtx,curY,raffleType,textColor){
  if(!showDetails){finaliseDownload();return;}
  const maxY=margin+th-50, avail=maxY-curY, content=[];
  if(raffleType==='prize'){const pd=document.getElementById('prizeDescription').value;if(pd)content.push({type:'prizeDesc',text:pd,bf:20,lh:26});}
  const pkgs=[];document.querySelectorAll('.package-row').forEach(r=>{const t=r.querySelector('.package-tickets').value,p=r.querySelector('.package-price').value;if(t&&p)pkgs.push(`${t} ${t==1?'ticket':'tickets'}/$${Math.round(parseFloat(p))}`);});
  if(pkgs.length>0){content.push({type:'pkgTitle',text:'Ticket Packages',bf:22,lh:35});pkgs.forEach(p=>content.push({type:'pkg',text:p,bf:19,lh:26}));}
  const tt=document.getElementById('totalTickets').value;if(tt)content.push({type:'tt',text:`${tt} total tickets available`,bf:17,lh:28});
  const pa=document.getElementById('prizeAmount').value;
  if(pa&&raffleType==='5050'){const paFmt='$'+pa;content.push({type:'pa50',text:'Winner receives 50% of ticket sales,',bf:17,lh:24});content.push({type:'pa50m',text:`to a maximum prize of ${paFmt}`,bf:17,lh:28});}
  else if(pa)content.push({type:'pa',text:`Prize: $${pa}`,bf:19,lh:28});
  const dd=document.getElementById('drawDate').value,dt=document.getElementById('drawTime').value,dl=document.getElementById('drawLocation').value;
  let dtxt='';
  if(dd||dt){dtxt='Draw is ';if(dt){const[hh,mm]=dt.split(':'),h=parseInt(hh);dtxt+=`at ${h>12?h-12:(h===0?12:h)}${mm!=='00'?':'+mm:''} ${h>=12?'pm':'am'}`;}if(dd){const d=new Date(dd+'T00:00:00');dtxt+=(dt?' on ':'on ')+d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}}
  if(dtxt)content.push({type:'di',text:dtxt,bf:16,lh:22,wrap:true});
  if(dl)content.push({type:'loc',text:dl,bf:16,lh:22,wrap:true});
  let totalH=0;content.forEach(c=>totalH+=c.wrap?c.lh*3:c.lh);
  const sf=totalH>avail?Math.max(0.6,avail/totalH):1.0;
  ctx.fillStyle=textColor;ctx.textAlign='center';
  content.forEach(c=>{
    const fs=Math.max(12,Math.floor(c.bf*sf)),lh=Math.floor(c.lh*sf);
    ctx.font=(c.type==='pkgTitle'||c.type==='prizeDesc')?`bold ${fs}px "Helvetica Neue",Helvetica,Arial,sans-serif`:`${fs}px "Helvetica Neue",Helvetica,Arial,sans-serif`;
    if(c.wrap){curY=wrapText(ctx,c.text,rtx,curY,tw-60,lh);curY+=lh;}
    else{let tw2=ctx.measureText(c.text).width,afs=fs;while(tw2>tw-60&&afs>12){afs--;ctx.font=(c.type==='pkgTitle'||c.type==='prizeDesc')?`bold ${afs}px "Helvetica Neue",Helvetica,Arial,sans-serif`:`${afs}px "Helvetica Neue",Helvetica,Arial,sans-serif`;tw2=ctx.measureText(c.text).width;}if(curY+lh<=maxY){ctx.fillText(c.text,rtx,curY);curY+=lh;}}
  });
  finaliseDownload();
}
