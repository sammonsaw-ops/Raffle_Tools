  if(!file){alert('Please upload a logo/image');return;}

  const sport=SPORTS[currentSport];
  const W=canvas.width, H=canvas.height;
  const img=new Image();
  img.onload=()=>{
    const accentColor=getDominantColor(img);

    // Extract full palette for lightest/darkest colour (text stroke and soccer shape stroke)
    let logoPalette=[[80,80,80]];
    try { logoPalette=new ColorThief().getPalette(img,8); } catch(e){}
    let lightestColor=[255,255,255], lightestLum=-1;
    let darkestColor=[0,0,0], darkestLum=2;
    for(const [r,g,b] of logoPalette){
      const lum=(0.299*r+0.587*g+0.114*b)/255;
      if(lum>lightestLum){lightestLum=lum; lightestColor=[r,g,b];}
      if(lum<darkestLum){darkestLum=lum; darkestColor=[r,g,b];}
    }

    // 1. Background + vignette
    sport.drawBg(ctx,W,H);
    const ov=ctx.createRadialGradient(W/2,H/2,H*0.1,W/2,H/2,H*0.85);
    ov.addColorStop(0,'rgba(0,0,0,0.08)'); ov.addColorStop(1,'rgba(0,0,0,0.45)');
    ctx.fillStyle=ov; ctx.fillRect(0,0,W,H);

    // 2. Ticket geometry
    const margin=40, gap=60, cr=18;
    const tw=(W-margin*2-gap)/2, th=H-margin*2;
    const lx=margin, ly=margin, rx=margin+tw+gap, ry=margin;

    function drawTicket(tx,ty,side,fillFn){
      // Layer 1: tight drop shadow
      ctx.save(); ctx.shadowColor='rgba(0,0,0,0.52)'; ctx.shadowBlur=26; ctx.shadowOffsetX=3; ctx.shadowOffsetY=8;
      ctx.fillStyle='white'; scalloppedRect(ctx,tx,ty,tw,th,cr,side); ctx.fill(); ctx.restore();
      // Layer 2: wider ambient shadow
      ctx.save(); ctx.shadowColor='rgba(0,0,0,0.22)'; ctx.shadowBlur=55; ctx.shadowOffsetX=0; ctx.shadowOffsetY=18;
      ctx.fillStyle='white'; scalloppedRect(ctx,tx,ty,tw,th,cr,side); ctx.fill(); ctx.restore();
      // Layer 3: warm white base fill (same gradient as std ticket)
      ctx.save();
      const pg=ctx.createLinearGradient(tx,ty,tx,ty+th);
      pg.addColorStop(0,'#fff'); pg.addColorStop(0.3,'#fdfbf8'); pg.addColorStop(0.7,'#faf7f2'); pg.addColorStop(1,'#f4f0ea');
      ctx.fillStyle=pg; scalloppedRect(ctx,tx,ty,tw,th,cr,side); ctx.fill(); ctx.restore();
      // Layer 4: sport texture clipped inside
      ctx.save(); scalloppedRect(ctx,tx,ty,tw,th,cr,side); ctx.clip(); fillFn(ctx,tx,ty,tw,th); ctx.restore();
      // Layer 5: subtle horizontal line texture (same as std)
      ctx.save(); scalloppedRect(ctx,tx,ty,tw,th,cr,side); ctx.clip();
      ctx.globalAlpha=0.022; ctx.strokeStyle='#666'; ctx.lineWidth=0.5;
      for(let rl=ty+3;rl<ty+th;rl+=4){ctx.beginPath();ctx.moveTo(tx,rl);ctx.lineTo(tx+tw,rl);ctx.stroke();}
      ctx.restore();
      // Layer 6: inner white highlight border
      ctx.save(); ctx.globalAlpha=0.65; ctx.strokeStyle='rgba(255,255,255,0.95)'; ctx.lineWidth=1.5;
      scalloppedRect(ctx,tx+1.5,ty+1.5,tw-3,th-3,Math.max(1,cr-1.5),side); ctx.stroke(); ctx.restore();
      // Layer 7: subtle inner dark border
      ctx.save(); ctx.globalAlpha=0.14; ctx.strokeStyle='rgba(0,0,0,1)'; ctx.lineWidth=1;
      scalloppedRect(ctx,tx+3,ty+3,tw-6,th-6,Math.max(1,cr-3),side); ctx.stroke(); ctx.restore();
      // Layer 8: warm outer stroke
      ctx.save(); ctx.strokeStyle='rgba(160,145,120,0.4)'; ctx.lineWidth=1;
      scalloppedRect(ctx,tx,ty,tw,th,cr,side); ctx.stroke(); ctx.restore();
    }
    drawTicket(lx,ly,'left',sport.fillLeft);
    drawTicket(rx,ry,'right',sport.fillRight);

    // 3. Sport shape backdrops
    const lcx=lx+tw/2, rcx=rx+tw/2;
    ctx.save(); scalloppedRect(ctx,lx,ly,tw,th,cr,'left'); ctx.clip();
    const lShape=drawSportBackdrop(ctx,lx,ly,tw,th,currentSport,accentColor,darkestColor); ctx.restore();
    ctx.save(); scalloppedRect(ctx,rx,ry,tw,th,cr,'right'); ctx.clip();
    const rShape=drawSportBackdrop(ctx,rx,ry,tw,th,currentSport,accentColor,darkestColor); ctx.restore();

    // 4. Text colour — contrast against the ticket background
    let accentTextCol;
    {
      const [ar,ag,ab]=accentColor;
      const lum=(0.299*ar+0.587*ag+0.114*ab)/255;
      accentTextCol = sport.lightTicket
        ? (lum<0.72 ? `rgb(${ar},${ag},${ab})` : '#1a1a1a')
        : '#ffffff';
    }

    // 5. Does the right ticket need the raffle label above the shape?
    //    Only when a prize image is uploaded OR additional details are on.
    const hasPrizeImg=raffleType==='prize'&&document.getElementById('prizeImageUpload').files[0]&&!document.getElementById('prizeImageUpload').disabled;
    const raffleAbove = hasPrizeImg || showDetails;

    // 6. Header zone (ticket top → shape top) — used for org name always,
    //    and for raffle label only when raffleAbove is true.
    const shapeTop  = lShape.cy - lShape.R;
    const headerTop = ly + 10;
    const headerBot = shapeTop - 10;
    const headerH   = Math.max(headerBot - headerTop, 1);

    // ── Header text sizing — org name may wrap to 2 lines ──────────────────────
    const orgLabel    = orgName.toUpperCase();
    const raffleLabel = raffleType==='5050' ? '50/50 RAFFLE' : 'PRIZE RAFFLE';
    const maxTxtW     = tw - 44;  // generous inset so text never flush to scalloped edge

    // Split org name into at most 2 lines at the best word boundary
    function splitToLines(text, maxW, font) {
      // Use measSpaced for accurate width with letter spacing
      const measure = (t) => measSpaced(t, headerFS);
      if(measure(text) <= maxW) return [text]; // fits on one line
      const words = text.split(' ');
      if(words.length < 2) return [text]; // single word — can't split
      // Try every split point, pick the one that minimises the max line width
      let bestLines = [text], bestMax = Infinity;
      for(let i=1;i<words.length;i++){
        const l1=words.slice(0,i).join(' '), l2=words.slice(i).join(' ');
        const maxW2=Math.max(measure(l1),measure(l2));
        if(maxW2<bestMax){bestMax=maxW2;bestLines=[l1,l2];}
      }
      return bestLines;
    }

    // ── measSpaced: measure rendered width including per-char letter gap ────────
    function measSpaced(text, fs) {
      ctx.font = `900 ${fs}px Impact,"Arial Black",sans-serif`;
      ctx.letterSpacing = (fs * 0.08) + 'px';
      const w = ctx.measureText(text).width;
      ctx.letterSpacing = '0px';
      return w;
    }

    // ── Find largest headerFS where all labels fit ────────────────────────────
    let headerFS = Math.min(Math.round(headerH * 0.88), 48);
    let orgLines = [orgLabel];

    for(; headerFS >= 10; headerFS--) {
      const fstr = `900 ${headerFS}px Impact,"Arial Black",sans-serif`;
      orgLines = splitToLines(orgLabel, maxTxtW, fstr);
      const lineH2   = headerFS * 1.1;
      const blockH2  = orgLines.length * lineH2;
      const orgOk    = orgLines.every(l => measSpaced(l, headerFS) <= maxTxtW);
      const rafOk    = !raffleAbove || measSpaced(raffleLabel, headerFS) <= maxTxtW;
      const heightOk = blockH2 <= headerH * 0.95;
      if(orgOk && rafOk && heightOk) break;
    }
    orgLines = splitToLines(orgLabel, maxTxtW, `900 ${headerFS}px Impact,"Arial Black",sans-serif`);
    const orgLineH  = headerFS * 1.1;
    const orgBlockH = orgLines.length * orgLineH;

    // Helper: draw one header line — logo-colour gradient, guaranteed readable
    function drawStyledLine(text, cx, y) {
      const lsEm = 0.08;
      const lsPx = headerFS * lsEm;
      ctx.font          = `900 ${headerFS}px Impact,"Arial Black",sans-serif`;
      ctx.letterSpacing = lsPx + 'px';
      ctx.textAlign     = 'center';
      ctx.textBaseline  = 'middle';
      ctx.lineJoin      = 'round';

      // Build a logo-colour gradient fill.
      // IMPORTANT: On dark tickets the gradient must stay light (luminance >= 0.65)
      // so it pops off the dark sport texture. On light tickets it must stay dark.
      const textW = ctx.measureText(text).width;
      const tg = ctx.createLinearGradient(cx-textW/2, y-headerFS*0.5, cx-textW/2, y+headerFS*0.5);
      const [ar,ag,ab] = accentColor;
      const lum = (0.299*ar + 0.587*ag + 0.114*ab) / 255;
      if (sport.lightTicket) {
        // Light ticket — use the raw logo colour (dark enough against light bg)
        tg.addColorStop(0,   `rgb(${ar},${ag},${ab})`);
        tg.addColorStop(0.5, `rgb(${Math.min(255,Math.round(ar*1.15))},${Math.min(255,Math.round(ag*1.15))},${Math.min(255,Math.round(ab*1.15))})`);
        tg.addColorStop(1,   `rgb(${ar},${ag},${ab})`);
      } else {
        // Dark ticket — guarantee the gradient colours are LIGHT (luminance >= 0.65).
        // If the logo colour is already light, use it. If dark, boost it to white-ish.
        function toLight(r,g,b) {
          const l = (0.299*r + 0.587*g + 0.114*b) / 255;
          if (l >= 0.65) return [r,g,b];
          // Blend toward white until luminance target is met
          const t = Math.min(1, (0.65 - l) / (1 - l + 0.001));
          return [
            Math.round(r + (255-r)*t),
            Math.round(g + (255-g)*t),
            Math.round(b + (255-b)*t)
          ];
        }
        const [r0,g0,b0] = toLight(ar,ag,ab);
        // Highlight: slightly brighter
        const rH=Math.min(255,Math.round(r0*1.15)), gH=Math.min(255,Math.round(g0*1.15)), bH=Math.min(255,Math.round(b0*1.15));
        // Shadow: slightly dimmer but still light
        const rD=Math.round(r0*0.82), gD=Math.round(g0*0.82), bD=Math.round(b0*0.82);
        tg.addColorStop(0,   `rgb(${rH},${gH},${bH})`);
        tg.addColorStop(0.35,`rgb(${r0},${g0},${b0})`);
        tg.addColorStop(0.55,`rgb(${rH},${gH},${bH})`);
        tg.addColorStop(0.80,`rgb(${rD},${gD},${bD})`);
        tg.addColorStop(1,   `rgb(${r0},${g0},${b0})`);
      }

      // Stroke: contrasting outline so text reads against sport texture AND the gradient
      const strokeW = Math.max(headerFS * 0.075, 2.0);
      ctx.lineWidth = strokeW;
      if (sport.lightTicket) {
        ctx.strokeStyle = 'rgba(255,255,255,0.80)';
      } else {
        // On dark tickets, use a dark stroke so light gradient letters have crisp edges
        ctx.strokeStyle = 'rgba(0,0,0,0.75)';
      }
      ctx.shadowColor = 'rgba(0,0,0,0)'; ctx.shadowBlur = 0;
      ctx.strokeText(text, cx, y);

      // Fill with gradient
      ctx.fillStyle     = tg;
      ctx.shadowColor   = sport.lightTicket ? 'rgba(0,0,0,0.22)' : 'rgba(0,0,0,0.65)';
      ctx.shadowBlur    = sport.lightTicket ? 3 : 6;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 1;
      ctx.fillText(text, cx, y);
      ctx.letterSpacing = '0px';
      ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    }
    // drawHeaderLabel: draws text (single line) centred in the header zone
    function drawHeaderLabel(text, cx) {
      ctx.save();
      drawStyledLine(text, cx, headerTop + headerH / 2);
      ctx.restore();
    }

    // drawOrgName: draws org name (1 or 2 lines) vertically centred in header zone
    function drawOrgName(cx) {
      ctx.save();
      const blockTop = headerTop + (headerH - orgBlockH) / 2 + orgLineH * 0.5;
      orgLines.forEach((line, i) => drawStyledLine(line, cx, blockTop + i * orgLineH));
      ctx.restore();
    }

    // 7. Left ticket: org name always above shape (1 or 2 lines)
    drawOrgName(lcx);

    // 8. Left ticket: logo inside shape
    {
      const pad=0.72, sz=lShape.R*2*pad;
      const sc=Math.min(sz/img.width,sz/img.height);
      const iw=img.width*sc, ih=img.height*sc;
      ctx.save(); sportShapePath(ctx,lx,ly,tw,th,currentSport); ctx.clip();
      ctx.drawImage(img,lShape.cx-iw/2,lShape.cy-ih/2,iw,ih); ctx.restore();
    }

    drawSportBand(ctx,lx,ly,tw,th,'left',cr,sport);
    if(showDetails){
      const lic=document.getElementById('licenceNumber').value;
      if(lic){
        ctx.save();
        const licText=`Licence ${lic}`;
        ctx.font=`600 11px "DM Sans",sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        const licW=ctx.measureText(licText).width+18;
        const licY=ly+th-60;
        // Dark pill background for readability
        ctx.fillStyle='rgba(0,0,0,0.50)';
        ctx.beginPath(); ctx.roundRect(lcx-licW/2,licY-9,licW,18,5); ctx.fill();
        // Text in lightest logo colour
        const [lr,lg,lb]=lightestLum>0.55?lightestColor:[255,255,255];
        ctx.fillStyle=`rgb(${lr},${lg},${lb})`;
        ctx.fillText(licText,lcx,licY);
        ctx.restore();
      }
    }

    // 9. Right ticket: raffle label above shape ONLY when raffleAbove, else text inside shape
    if(raffleAbove){
      drawHeaderLabel(raffleLabel, rcx);
    }

    // 10. Right ticket: shape content
    function finishRightTicket(){
      if(!raffleAbove){
        // Default: raffle type text centered inside the shape
        drawRaffleTextInShape(ctx,rcx,rShape,raffleType,accentTextCol,accentColor);
      }
      if(showDetails){
        // Details fill the inside of the shape, vertically centred.
        // Details fill the inside of the shape, vertically centred.
        const shapeInnerTop = rShape.cy - rShape.R + 10;
        drawSportDetails(ctx,showDetails,rx,tw,ry,th,rcx,shapeInnerTop,raffleType,sport,rShape,accentTextCol,accentColor);
      }
      drawSportBand(ctx,rx,ry,tw,th,'right',cr,sport);
      finaliseDownload();
    }

    if(hasPrizeImg){
      const pf=document.getElementById('prizeImageUpload').files[0];
      const pi=new Image();
      pi.onload=()=>{
        const prizeClean=removeImageBackground(pi);
        const pSz=rShape.R*2*0.72;
        const psc=Math.min(pSz/pi.width,pSz/pi.height);
        const pw=pi.width*psc, ph=pi.height*psc;
        // Always draw prize image at full opacity inside the shape
        ctx.save(); sportShapePath(ctx,rx,ry,tw,th,currentSport); ctx.clip();
        ctx.drawImage(prizeClean,rShape.cx-pw/2,rShape.cy-ph/2,pw,ph);
        ctx.restore();
        finishRightTicket();
      };
      pi.src=URL.createObjectURL(pf);
    } else {
      finishRightTicket();
    }
  };
  img.src=URL.createObjectURL(file);
}

// Draw 50/50 or PRIZE/RAFFLE text centered inside the sport shape.
// Shape is always white — use dark accent or near-black.
function drawRaffleTextInShape(ctx, rcx, shapeInfo, raffleType, accentTextCol, accentColor) {
  const {cy, R} = shapeInfo;
  const mainTxt = raffleType==='5050' ? '50/50' : 'PRIZE';
  const subTxt  = 'RAFFLE';

  let mfs = Math.round(R * 0.72);
  ctx.font = `900 ${mfs}px Impact,"Arial Black",sans-serif`;
  while(ctx.measureText(mainTxt).width > R*1.75 && mfs>24){ mfs-=2; ctx.font=`900 ${mfs}px Impact,"Arial Black",sans-serif`; }
  const sfs=Math.round(mfs*0.42), gap=Math.round(mfs*0.1);
  const totalH=mfs+gap+sfs;
  const mainY=cy-totalH/2+mfs, subY=mainY+gap+sfs;

  // Build logo-colour gradient — shape is WHITE so gradient must be DARK (luminance <= 0.45)
  const tg = ctx.createLinearGradient(rcx-R, mainY-mfs, rcx-R, subY);
  if(accentColor){
    const [ar,ag,ab]=accentColor;
    const lum=(0.299*ar+0.587*ag+0.114*ab)/255;
    // Ensure colour is dark enough to read on white shape
    function toDark(r,g,b){
      const l=(0.299*r+0.587*g+0.114*b)/255;
      if(l<=0.45) return [r,g,b];
      const t=Math.min(1,(l-0.45)/(l+0.001));
      return [Math.round(r*(1-t)), Math.round(g*(1-t)), Math.round(b*(1-t))];
    }
    const [r0,g0,b0]=toDark(ar,ag,ab);
    const rH=Math.min(255,Math.round(r0*1.3)), gH=Math.min(255,Math.round(g0*1.3)), bH=Math.min(255,Math.round(b0*1.3));
    const rD=Math.round(r0*0.7), gD=Math.round(g0*0.7), bD=Math.round(b0*0.7);
    tg.addColorStop(0,   `rgb(${rH},${gH},${bH})`);
    tg.addColorStop(0.35,`rgb(${r0},${g0},${b0})`);
    tg.addColorStop(0.55,`rgb(${rH},${gH},${bH})`);
    tg.addColorStop(0.80,`rgb(${rD},${gD},${bD})`);
    tg.addColorStop(1,   `rgb(${r0},${g0},${b0})`);
  } else {
    tg.addColorStop(0,'#1a1a1a'); tg.addColorStop(1,'#1a1a1a');
  }
  // Sub text: same dark base colour
  let subFill='#1a1a1a';
  if(accentColor){
    const [ar,ag,ab]=accentColor;
    const lum=(0.299*ar+0.587*ag+0.114*ab)/255;
    subFill = lum<=0.55 ? `rgb(${ar},${ag},${ab})` : '#1a1a1a';
  }

  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.font=`900 ${mfs}px Impact,"Arial Black",sans-serif`;
  const ls=raffleType==='5050'?4:6;
  const totalLW=mainTxt.split('').reduce((s,l)=>s+ctx.measureText(l).width+ls,0)-ls;
  let xp=rcx-totalLW/2;
  ctx.fillStyle=tg;
  ctx.shadowColor='rgba(0,0,0,0.18)'; ctx.shadowBlur=4; ctx.shadowOffsetX=1; ctx.shadowOffsetY=1;
  mainTxt.split('').forEach(l=>{const lw2=ctx.measureText(l).width;ctx.fillText(l,xp+lw2/2,mainY);xp+=lw2+ls;});
  ctx.font=`bold ${sfs}px "DM Sans","Helvetica Neue",sans-serif`;
  ctx.fillStyle=subFill;
  ctx.shadowColor='rgba(0,0,0,0.12)'; ctx.shadowBlur=3;
  ctx.fillText(subTxt,rcx,subY);
  ctx.restore();
}


function drawTicketBorderGlow(ctx,x,y,w,h,side,cr,color){
  ctx.save();
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.globalAlpha=0.5;
  scalloppedRect(ctx,x+1,y+1,w-2,h-2,Math.max(1,cr-1),side); ctx.stroke();
  ctx.restore();
}

function drawSportBand(ctx,x,y,w,h,side,cr,sport){
  const bandH=50;
  ctx.save();
  scalloppedRect(ctx,x,y,w,h,cr,side); ctx.clip();
  const bg=ctx.createLinearGradient(x,y+h-bandH,x+w,y+h);
  bg.addColorStop(0,'rgba(0,0,0,0.72)'); bg.addColorStop(1,'rgba(0,0,0,0.86)');
  ctx.fillStyle=bg; ctx.fillRect(x,y+h-bandH,w,bandH);
  const icx=x+w/2, icy=y+h-bandH/2;
  if(sport.name==='RINGETTE'){
    drawRingetteRing(ctx, icx, icy, 15, 7);
  } else if(sport.name==='SOCCER'){
    // Draw B&W canvas soccer ball matching the selector icon
    ctx.save();
    ctx.beginPath(); ctx.arc(icx,icy,14,0,Math.PI*2); ctx.fillStyle='#f5f5f5'; ctx.fill();
    drawSoccerBallBW(ctx, icx, icy, 14);
    const sheen=ctx.createRadialGradient(icx-5,icy-5,1,icx,icy,14);
    sheen.addColorStop(0,'rgba(255,255,255,0.40)'); sheen.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sheen; ctx.beginPath(); ctx.arc(icx,icy,14,0,Math.PI*2); ctx.fill();
    ctx.restore();
  } else if(sport.name==='GOLF') {
    // Small white golf ball with dimples
    ctx.save();
    const gr=ctx.createRadialGradient(icx-4,icy-4,1,icx,icy,13);
    gr.addColorStop(0,'#ffffff'); gr.addColorStop(1,'#cccccc');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(icx,icy,13,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.arc(icx,icy,13,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.12)';
    [[-4,-5],[0,-6],[4,-4],[6,0],[4,4],[0,6],[-4,4],[-6,0],[-3,1],[3,-1]].forEach(([dx,dy])=>{
      ctx.beginPath(); ctx.arc(icx+dx,icy+dy,1.4,0,Math.PI*2); ctx.fill();
    });
    ctx.restore();
  } else if(sport.name==='FIGURE SKATING') {
    // Proper figure skate — high ankle boot, side view, white with black outlines
    ctx.save();
    const sx=icx-11, sy=icy-13; // offset so skate sits centred in band
    // Main boot body path (scaled ~1.8x from SVG viewBox 26px → band ~22px)
    const sc=0.85; // scale factor relative to SVG coords centred at (13,13)
    function sp(x,y){return [icx + (x-13)*sc, icy-2 + (y-13)*sc];}
    // Boot fill
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    let p=sp(4,18); ctx.moveTo(p[0],p[1]);
    p=sp(4,10);  ctx.lineTo(p[0],p[1]);
    p=sp(9,3.5); ctx.quadraticCurveTo(...sp(6,4), p[0],p[1]);
    p=sp(12,3);  ctx.quadraticCurveTo(...sp(10.5,3.2), p[0],p[1]);
    p=sp(14,5);  ctx.quadraticCurveTo(...sp(13,3), p[0],p[1]);
    p=sp(14,11); ctx.lineTo(p[0],p[1]);
    p=sp(21,13); ctx.quadraticCurveTo(...sp(20,11), p[0],p[1]);
    p=sp(20,17.5);ctx.quadraticCurveTo(...sp(21.5,16.5), p[0],p[1]);
    p=sp(18,18); ctx.lineTo(p[0],p[1]);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=1.5; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
    // Boot outline in white (visible on dark band)
    ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=1.3;
    // Lace line (front of boot)
    ctx.beginPath(); let lp=sp(12,4.8); ctx.moveTo(lp[0],lp[1]);
    [6.5,8.2,9.8].forEach(y=>{const pp=sp(11.8-(y-4.8)*0.07,y);ctx.lineTo(pp[0],pp[1]);});
    ctx.stroke();
    // Sole bar
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath();
    const sl1=sp(3.5,17.5),sl2=sp(20.5,17.5),sl3=sp(20.5,19.5),sl4=sp(3.5,19.5);
    ctx.moveTo(sl1[0],sl1[1]); ctx.lineTo(sl2[0],sl2[1]); ctx.lineTo(sl3[0],sl3[1]); ctx.lineTo(sl4[0],sl4[1]); ctx.closePath(); ctx.fill();
    // Heel block
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.beginPath();
    const h1=sp(3.5,17.5),h2=sp(7.5,17.5),h3=sp(7.5,19.7),h4=sp(3.5,19.7);
    ctx.moveTo(h1[0],h1[1]); ctx.lineTo(h2[0],h2[1]); ctx.lineTo(h3[0],h3[1]); ctx.lineTo(h4[0],h4[1]); ctx.closePath(); ctx.fill();
    // Blade
    ctx.strokeStyle='rgba(200,220,240,0.95)'; ctx.lineWidth=2.0;
    const b1=sp(2.5,19.5), b2=sp(22,19.5);
    ctx.beginPath(); ctx.moveTo(b1[0],b1[1]); ctx.quadraticCurveTo((b1[0]+b2[0])/2, b1[1]-1.5*sc, b2[0],b2[1]); ctx.stroke();
    // Toe picks
    ctx.strokeStyle='rgba(200,220,240,0.9)'; ctx.lineWidth=1.0;
    [[20.5,19.3,21.5,17.8],[21.8,19.4,22.8,17.9]].forEach(([x1,y1,x2,y2])=>{
      const pp1=sp(x1,y1),pp2=sp(x2,y2);
      ctx.beginPath(); ctx.moveTo(pp1[0],pp1[1]); ctx.lineTo(pp2[0],pp2[1]); ctx.stroke();
    });
    // Lace dots
    ctx.fillStyle='rgba(255,255,255,0.6)';
    [4.8,6.5,8.2,9.8].forEach(y=>{const pp=sp(12.2-(y-4.8)*0.07,y);ctx.beginPath();ctx.arc(pp[0],pp[1],0.9*sc,0,Math.PI*2);ctx.fill();});
    ctx.restore();
  } else if(sport.name==='LACROSSE') {
    // Lacrosse stick head outline
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.90)'; ctx.lineWidth=2; ctx.lineCap='round';
    const lhx=icx, lhy=icy, r2=12;
    ctx.beginPath();
    ctx.moveTo(lhx, lhy-r2);
    ctx.bezierCurveTo(lhx+r2*0.85,lhy-r2*0.9, lhx+r2*0.85,lhy+r2*0.5, lhx,lhy+r2*0.65);
    ctx.bezierCurveTo(lhx-r2*0.85,lhy+r2*0.5, lhx-r2*0.85,lhy-r2*0.9, lhx,lhy-r2);
    ctx.stroke();
    // Mesh cross lines
    ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=1;
    for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(lhx+i*5,lhy-r2*0.8);ctx.lineTo(lhx+i*5,lhy+r2*0.55);ctx.stroke();}
    for(let j=-1;j<=1;j++){const spread=r2*0.7*(1-Math.abs(j)*0.3);ctx.beginPath();ctx.moveTo(lhx-spread,lhy+j*4);ctx.lineTo(lhx+spread,lhy+j*4);ctx.stroke();}
    // Handle
    ctx.strokeStyle='rgba(255,255,255,0.75)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(lhx,lhy+r2*0.65); ctx.lineTo(lhx,lhy+r2*1.3); ctx.stroke();
    ctx.restore();
  } else if(sport.name==='RUGBY') {
    // Rugby ball — brown ellipse with white lace
    ctx.save();
    const rrx=14, rry=8;
    const rg=ctx.createRadialGradient(icx-4,icy-3,2,icx,icy,rrx);
    rg.addColorStop(0,'#a0522d'); rg.addColorStop(1,'#5C2D0A');
    ctx.fillStyle=rg;
    ctx.beginPath(); ctx.ellipse(icx,icy,rrx,rry,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#3a1a00'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(icx,icy,rrx,rry,0,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='rgba(50,20,0,0.5)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(icx-rrx,icy); ctx.quadraticCurveTo(icx,icy-rry*0.7,icx+rrx,icy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(icx-rrx,icy); ctx.quadraticCurveTo(icx,icy+rry*0.7,icx+rrx,icy); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.92)'; ctx.lineWidth=1.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(icx,icy-rry*0.7); ctx.lineTo(icx,icy+rry*0.7); ctx.stroke();
    ctx.lineWidth=1;
    [-4,0,4].forEach(dy=>{ctx.beginPath();ctx.moveTo(icx-4,icy+dy);ctx.lineTo(icx+4,icy+dy);ctx.stroke();});
    ctx.restore();
  } else if(sport.name==='TENNIS') {
    // Tennis ball — yellow-green with white seam curves
    ctx.save();
    const tr=13;
    const tg=ctx.createRadialGradient(icx-4,icy-4,2,icx,icy,tr);
    tg.addColorStop(0,'#e0ee00'); tg.addColorStop(1,'#a8b800');
    ctx.fillStyle=tg;
    ctx.beginPath(); ctx.arc(icx,icy,tr,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#8a9a00'; ctx.lineWidth=0.7;
    ctx.beginPath(); ctx.arc(icx,icy,tr,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.88)'; ctx.lineWidth=2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(icx-tr*0.55,icy-tr*0.7); ctx.quadraticCurveTo(icx-tr,icy,icx-tr*0.55,icy+tr*0.7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(icx+tr*0.55,icy-tr*0.7); ctx.quadraticCurveTo(icx+tr,icy,icx+tr*0.55,icy+tr*0.7); ctx.stroke();
    ctx.restore();
  } else {
    ctx.font=`28px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='white';
    ctx.fillText(sport.emoji,icx,icy);
  }
  ctx.restore();
}

// Reusable ringette donut ring renderer.
// cx,cy = centre; oR = outer radius; iR = inner radius (hole)
// Uses even-odd fill rule so the hole is genuinely transparent — shows whatever is underneath.
function drawRingetteRing(ctx, cx, cy, oR, iR) {
  ctx.save();
  // Radial gradient for 3-D rubber look (light top-left → deep bottom-right)
  const rg=ctx.createRadialGradient(cx-oR*0.35, cy-oR*0.35, 1, cx, cy, oR*1.05);
  rg.addColorStop(0,   '#7ecbf0');
  rg.addColorStop(0.38,'#3a9ad4');
  rg.addColorStop(0.76,'#2176ae');
  rg.addColorStop(1,   '#155e8a');
  ctx.fillStyle=rg;
  // Compound path: outer circle (CW) + inner circle (CCW) → even-odd gives clean hole
  ctx.beginPath();
  ctx.arc(cx, cy, oR, 0, Math.PI*2, false);   // outer — clockwise
  ctx.arc(cx, cy, iR, 0, Math.PI*2, true);    // inner — counter-clockwise (creates hole)
  ctx.fill('evenodd');
  // Subtle tread groove arcs around the ring body
  ctx.globalAlpha=0.28;
  ctx.strokeStyle='#0d3d5e';
  ctx.lineWidth=1.0;
  const rm=(oR+iR)/2;
  for(let i=0;i<10;i++){
    const a=i*Math.PI/5;
    ctx.beginPath(); ctx.arc(cx,cy,rm,a,a+0.20); ctx.stroke();
  }
  ctx.globalAlpha=1;
  // Gloss sheen arc at top-left
  ctx.strokeStyle='rgba(255,255,255,0.60)';
  ctx.lineWidth=oR>12 ? 2.2 : 1.4;
  ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(cx,cy,oR*0.76,Math.PI*1.08,Math.PI*1.62); ctx.stroke();
  ctx.restore();
}

function drawSportDetails(ctx,showDetails,rx,tw,ry,th,rcx,startY,raffleType,sport,shapeInfo,textCol,accentColor){
  if(!showDetails) return;

  // ── Shape geometry ─────────────────────────────────────────────────────────
  const cy   = shapeInfo ? shapeInfo.cy : ry+th/2;
  const R    = shapeInfo ? shapeInfo.R  : Math.min(tw,th)*0.40;
  const pad  = R * 0.12;          // padding from shape edge to text
  const top  = cy - R + pad;
  const bot  = cy + R - pad;
  const avail = bot - top;

  // ── Collect raw items ──────────────────────────────────────────────────────
  const rawItems = [];
  if(raffleType==='prize'){const pd=document.getElementById('prizeDescription').value;if(pd)rawItems.push({text:pd,bold:true});}
  const pkgs=[];
  document.querySelectorAll('.package-row').forEach(r=>{
    const t=r.querySelector('.package-tickets').value,p=r.querySelector('.package-price').value;
    if(t&&p)pkgs.push(`${t} ${t==1?'ticket':'tickets'} / $${Math.round(parseFloat(p))}`);
  });
  if(pkgs.length>0){rawItems.push({text:'Ticket Packages',bold:true});pkgs.forEach(p=>rawItems.push({text:p,bold:false}));}
  const tt=document.getElementById('totalTickets').value;
  if(tt)rawItems.push({text:`${tt} tickets available`,bold:false});
  const pa=document.getElementById('prizeAmount').value;
  if(pa&&raffleType==='5050')rawItems.push({text:`50% of sales — max: $${pa}`,bold:false});
  else if(pa)rawItems.push({text:`Prize: $${pa}`,bold:true});
  const dd=document.getElementById('drawDate').value,dt=document.getElementById('drawTime').value,dl=document.getElementById('drawLocation').value;
  let dtxt='';
  if(dd||dt){dtxt='Draw: ';if(dt){const[hh,mm]=dt.split(':'),h=parseInt(hh);dtxt+=`${h>12?h-12:(h===0?12:h)}${mm!=='00'?':'+mm:''} ${h>=12?'pm':'am'}`;}if(dd){const d2=new Date(dd+'T00:00:00');dtxt+=(dt?' · ':'')+d2.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}}
  if(dtxt)rawItems.push({text:dtxt,bold:false});
  if(dl)rawItems.push({text:dl,bold:false});
  if(rawItems.length===0) return;

  // ── Text colour — shape interior is always white, so always use dark text ──
  // accentTextCol passed in may be white (for dark-ticket sports like hockey/football),
  // which would be invisible against the white shape. Force near-black for readability.
  // Text colour: use logo colour if dark enough to read on white shape, else near-black
  let detailColor = '#1a1a1a';
  if(accentColor){
    const [ar,ag,ab]=accentColor;
    const lum=(0.299*ar+0.587*ag+0.114*ab)/255;
    detailColor = lum<=0.55 ? `rgb(${ar},${ag},${ab})` : '#1a1a1a';
  }

  // ── Find the largest font that fits all lines vertically + horizontally ────
  // Strategy: start at a generous size, expand items into wrapped lines,
  // measure total block height, scale to fill ~88% of avail height.
  function measureLines(fs) {
    const lineH = fs * 1.22;
    let lines = [];
    for(const item of rawItems){
      const font = `${item.bold?'bold ':' '}${fs}px "DM Sans","Helvetica Neue",sans-serif`;
      ctx.font = font;
      // For each item, wrap words to fit within the chord at that vertical position
      const words = item.text.split(' ');
      let line = '', lineLines = [];
      for(const w of words){
        const test = line ? line+' '+w : w;
        // Use conservative chord = R*1.55 (mid-circle chord; items near edge get natural clip)
        if(ctx.measureText(test).width > R*1.55 && line){ lineLines.push({text:line,bold:item.bold}); line=w; }
        else line=test;
      }
      if(line) lineLines.push({text:line,bold:item.bold});
      lines = lines.concat(lineLines);
    }
    return {lines, lineH, totalH: lines.length * lineH};
  }

  // Binary-search for best font size that fills ~88% of available height
  let lo=8, hi=Math.min(28, Math.floor(avail*0.88));
  let bestFS = lo, bestMeasure = measureLines(lo);
  while(lo<=hi){
    const mid=Math.floor((lo+hi)/2);
    const m=measureLines(mid);
    if(m.totalH <= avail*0.92){ bestFS=mid; bestMeasure=m; lo=mid+1; }
    else hi=mid-1;
  }
  const {lines, lineH, totalH} = bestMeasure;

  // ── Vertical centering: start so block is centred in shape ────────────────
  const blockStartY = cy - totalH/2 + lineH*0.82; // 0.82 ≈ alphabetic baseline offset

  // ── Draw ──────────────────────────────────────────────────────────────────
  ctx.save();
  if(shapeInfo){ sportShapePath(ctx,rx,ry,tw,th,currentSport); ctx.clip(); }
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';

  lines.forEach((ln,i) => {
    const y = blockStartY + i*lineH;
    if(y > bot) return; // clip overflow
    const font = `${ln.bold?'bold ':' '}${bestFS}px "DM Sans","Helvetica Neue",sans-serif`;
    ctx.font = font;
    ctx.fillStyle=detailColor;
    ctx.shadowColor='rgba(0,0,0,0.20)';
    ctx.shadowBlur=2; ctx.shadowOffsetX=0; ctx.shadowOffsetY=1;
    ctx.fillText(ln.text,rcx,y);
  });
  ctx.restore();
}
